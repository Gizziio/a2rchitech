# A2R coturn configuration
# For WebRTC TURN server (NAT traversal)

# Listening ports
listening-port=3478
tls-listening-port=5349

# Realm and authentication
realm=a2r.io
server-name=a2r-turn
lt-cred-mech
user-quota=10
total-quota=100

# Use HMAC-based credentials (short-lived)
use-auth-secret
static-auth-secret=change-this-secret-in-production

# No long-term credentials - all credentials are time-limited
no-cli

# Log file
log-file=/var/log/turnserver.log
verbose

# Network settings
external-ip=127.0.0.1
relay-ip=127.0.0.1

# Allowed peer IPs (0.0.0.0 means all - restrict in production)
no-loopback-peers
no-multicast-peers

# Deny certain ports
denied-peer-port=0-1023
denied-peer-port=25
denied-peer-port=110
denied-peer-port=143

# Rate limiting
max-bps=10000000

# SSL/TLS certificates (generate with openssl for production)
# cert=/etc/turnserver/cert.pem
# pkey=/etc/turnserver/pkey.pem
