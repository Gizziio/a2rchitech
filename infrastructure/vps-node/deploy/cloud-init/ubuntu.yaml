#cloud-config
# Allternit Node Agent - Ubuntu/Debian Cloud Init
# Usage: hcloud server create --user-data-from-file cloud-init.yaml

package_update: true
package_upgrade: false

packages:
  - docker.io
  - curl
  - ca-certificates

# Enable Docker service
systemd:
  docker:
    enabled: true
    command: start

# Create allternit user and group
groups:
  - docker

users:
  - name: allternit
    homedir: /home/allternit
    system: true
    groups: docker

# Write installation script
write_files:
  - path: /tmp/install-allternit.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e
      
      # Configuration from metadata
      Allternit_TOKEN="${Allternit_TOKEN:-}"
      Allternit_NODE_ID="${Allternit_NODE_ID:-}"
      Allternit_CONTROL_PLANE="${Allternit_CONTROL_PLANE:-wss://control.allternit.io}"
      
      # If token not provided, try to get from instance tags (cloud provider specific)
      if [ -z "$Allternit_TOKEN" ]; then
        # Try to get from instance metadata (implement per cloud provider)
        echo "Warning: Allternit_TOKEN not set"
        exit 1
      fi
      
      # Download and install
      curl -sL https://github.com/allternit/node/releases/latest/download/allternit-node-linux-$(uname -m | sed 's/x86_64/x86_64/' | sed 's/aarch64/aarch64/') \
        -o /opt/allternit/bin/allternit-node
      chmod +x /opt/allternit/bin/allternit-node
      
      # Create configuration
      mkdir -p /etc/allternit
      cat > /etc/allternit/node.env << EOF
Allternit_NODE_ID=${Allternit_NODE_ID:-node-$(hostname)}
Allternit_TOKEN=${Allternit_TOKEN}
Allternit_CONTROL_PLANE=${Allternit_CONTROL_PLANE}
EOF
      chmod 600 /etc/allternit/node.env
      
      # Install systemd service
      mkdir -p /etc/systemd/system
      cat > /etc/systemd/system/allternit-node.service << 'EOF'
[Unit]
Description=Allternit Node Agent
After=network.target docker.service
Requires=docker.service

[Service]
Type=simple
EnvironmentFile=/etc/allternit/node.env
ExecStart=/opt/allternit/bin/allternit-node
Restart=always
RestartSec=5

[Install]
WantedBy=multi-user.target
EOF
      
      systemctl daemon-reload
      systemctl enable allternit-node
      systemctl start allternit-node

# Run installation on first boot
runcmd:
  - systemctl start docker
  - /tmp/install-allternit.sh

# Clean up on final boot
final_message: |
  Allternit Node installation complete!
  Check status: systemctl status allternit-node
  View logs: journalctl -u allternit-node
