version: '3.8'

# Allternit Node Agent Docker Compose
#
# Usage:
#   Allternit_TOKEN=xxx docker-compose up -d
#
# Or with .env file:
#   cp .env.example .env
#   # Edit .env with your settings
#   docker-compose up -d

services:
  allternit-node:
    image: ghcr.io/allternit/node:latest
    # Or build from source:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    
    container_name: allternit-node
    
    restart: unless-stopped
    
    # Docker socket access for containerized job execution
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - allternit-config:/etc/allternit
      - allternit-logs:/var/log/allternit
    
    # Environment variables
    environment:
      - Allternit_NODE_ID=${Allternit_NODE_ID:-node-${HOSTNAME}}
      - Allternit_TOKEN=${Allternit_TOKEN}
      - Allternit_CONTROL_PLANE=${Allternit_CONTROL_PLANE:-wss://control.allternit.io}
      - Allternit_LABELS=${Allternit_LABELS:-docker}
      - Allternit_MAX_CONCURRENT_JOBS=${Allternit_MAX_CONCURRENT_JOBS:-10}
      - RUST_LOG=${RUST_LOG:-info}
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Health check
    healthcheck:
      test: ["CMD", "/opt/allternit/bin/allternit-node", "--health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Security options
    security_opt:
      - no-new-privileges:true
    
    # Read-only root filesystem (optional, may need adjustments)
    # read_only: true
    
    # Temporary filesystems (if read_only is enabled)
    # tmpfs:
    #   - /tmp:size=100M
    #   - /run:size=50M

# Named volumes
volumes:
  allternit-config:
    driver: local
  allternit-logs:
    driver: local
