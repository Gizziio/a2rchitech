name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-latest
            arch: arm64
            output: gizzi-code-darwin-arm64
          - target: darwin-x64
            os: macos-latest
            arch: x64
            output: gizzi-code-darwin-x64
          - target: linux-arm64
            os: ubuntu-latest
            arch: arm64
            output: gizzi-code-linux-arm64
          - target: linux-x64
            os: ubuntu-latest
            arch: x64
            output: gizzi-code-linux-x64
          - target: windows-x64
            os: windows-latest
            arch: x64
            output: gizzi-code-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          bun build ./src/cli/main.ts \
            --outfile ./dist/${{ matrix.output }} \
            --target bun-${{ matrix.target }} \
            --conditions=browser

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ./dist/${{ matrix.output }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release files
        run: |
          mkdir -p ./release
          cp ./artifacts/gizzi-code-darwin-arm64/gizzi-code-darwin-arm64 ./release/
          cp ./artifacts/gizzi-code-darwin-x64/gizzi-code-darwin-x64 ./release/
          cp ./artifacts/gizzi-code-linux-arm64/gizzi-code-linux-arm64 ./release/
          cp ./artifacts/gizzi-code-linux-x64/gizzi-code-linux-x64 ./release/
          cp ./artifacts/gizzi-code-windows-x64.exe/gizzi-code-windows-x64.exe ./release/
          
          # Create checksums
          cd ./release
          sha256sum * > checksums.txt
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./release/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Gizzi Code ${{ github.ref_name }}

            AI-powered terminal interface for the A2R ecosystem.

            ### Install

            **macOS/Linux:**
            ```bash
            curl -fsSL https://install.gizziio.com/install | bash
            ```

            **Windows:**
            ```powershell
            irm https://install.gizziio.com/install.ps1 | iex
            ```

            **npm:**
            ```bash
            npm install -g @gizzi/gizzi-code
            ```

            ### Binaries

            | Platform | Architecture | Binary |
            |----------|-------------|--------|
            | macOS | ARM64 | `gizzi-code-darwin-arm64` |
            | macOS | x64 | `gizzi-code-darwin-x64` |
            | Linux | ARM64 | `gizzi-code-linux-arm64` |
            | Linux | x64 | `gizzi-code-linux-x64` |
            | Windows | x64 | `gizzi-code-windows-x64.exe` |

            ### Checksums
            See `checksums.txt` for SHA256 checksums.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build
        working-directory: ./cli-package

      - name: Publish to npm
        run: npm publish --access public
        working-directory: ./cli-package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
