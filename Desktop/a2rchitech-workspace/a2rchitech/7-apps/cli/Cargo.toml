[package]
name = "a2rchitech-cli"
version = "0.1.0"
edition = "2021"
description = "A2rchitech command-line interface for kernel control"

[[bin]]
name = "a2rchitech"
path = "src/main.rs"

[dependencies]

serde = { workspace = true }

serde_json = { workspace = true }

tokio = { workspace = true }

anyhow = { workspace = true }

clap = { version = "4.0", features = ["derive"] }

reqwest = { workspace = true, features = ["json"] }

dialoguer = "0.11"

indicatif = "0.17"

colored = "2.0"

axum = "0.7"

tabled = "0.15"

directories = "5.0"

config = "0.13"

ratatui = "0.26"

crossterm = { version = "0.27", features = ["event-stream"] }

futures-util = "0.3"
ring = "0.17"
data-encoding = "2.0"
urlencoding = "2.1"

voice-service = { path = "../../4-services/ml-ai-services/voice-service" }

webvm-service = { path = "../../3-adapters/bridge-systems/a2r-webvm" }
marketplace = { path = "../../3-adapters/rust/marketplace" }

sqlx = { workspace = true, features = ["runtime-tokio-rustls", "sqlite"] }

a2r-skill-portability = { path = "../../0-substrate/a2r-skill-portability" }
serde_yaml = "0.9"

syntect = { version = "5.1", default-features = false, features = ["default-fancy"] }

[dev-dependencies]
tempfile = "3.8"
