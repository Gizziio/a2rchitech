[package]
name = "multimodal-streaming-execution"
version = "0.1.0"
edition = "2021"
authors = ["T2-A1 <audio-team@a2rchitech.ai>"]
description = "WebRTC audio pipeline and streaming execution module"

[dependencies]
# WebRTC - Selected after GAP-36 research (webrtc-rs)
# STUB_APPROVED: webrtc = "0.12"

# Audio codec support
# STUB_APPROVED: opus = "0.3"

# Async runtime
tokio = { version = "1.40", features = ["full"] }
tokio-util = "0.7"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Logging
tracing = "0.1"

# Utilities
bytes = "1.9"
uuid = { version = "1.11", features = ["v4", "serde"] }
parking_lot = "0.12"
dashmap = "6.1"

# WebSocket for signaling (T2-A5)
# STUB_APPROVED: tokio-tungstenite = "0.24"

# URL parsing
url = "2.5"

# Random
rand = "0.8"

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.13"
