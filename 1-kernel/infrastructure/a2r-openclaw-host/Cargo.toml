[package]
name = "a2r-openclaw-host"
version = "0.1.0"
edition = "2021"
description = "OpenClaw subprocess host with parity capture integration"
authors = ["A2rchitect Team"]

[lib]
name = "a2r_openclaw_host"
path = "src/lib.rs"

[[bin]]
name = "capture-golden-corpus"
path = "src/bin/capture-golden-corpus.rs"

[[bin]]
name = "dualrun-test"
path = "src/bin/dualrun-test.rs"

[[bin]]
name = "flagctl"
path = "src/bin/flagctl.rs"

[[bin]]
name = "migration-complete"
path = "src/bin/migration-complete.rs"

[[bin]]
name = "skill-registry"
path = "src/bin/skill-registry.rs"

[[bin]]
name = "skill-registry-bridge"
path = "src/bin/skill-registry-bridge.rs"

[[bin]]
name = "tui-native"
path = "src/bin/tui-native.rs"

[dependencies]
a2r_parity = { package = "a2r-parity", path = "../a2r-parity" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["full", "process", "io-std", "io-util"] }
async-trait = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
sha2 = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

reqwest = { version = "0.11", default-features = false, features = ["json", "rustls-tls"] }
regex = "1.0"
clap = { workspace = true }
rand = "0.8"
lazy_static = "1.4"
tar = "0.4"
flate2 = "1.0"
serde_yaml = "0.9"
crossterm = "0.27"
ratatui = "0.26"
axum = { workspace = true }
tower-http = { workspace = true }
tokio-cron-scheduler = "0.10"
tokio-tungstenite = { version = "0.28.0", optional = true }
futures-util = { version = "0.3.31", optional = true }
futures = { workspace = true }
async-stream = "0.3"
tokio-stream = { workspace = true }

[dev-dependencies]
tokio-test = "0.4"

[features]
tokio-tungstenite = ["dep:tokio-tungstenite"]
futures-util = ["dep:futures-util"]
