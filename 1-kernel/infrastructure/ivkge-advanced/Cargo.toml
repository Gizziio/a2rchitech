[package]
name = "a2r-ivkge-advanced"
version = "0.1.0"
edition = "2021"
description = "IVKGE Advanced: Visual diagram extraction with OCR, corrections, and ambiguity handling"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
thiserror = "1"
image = "0.24"
base64 = "0.21"

[dev-dependencies]
tokio-test = "0.4"
