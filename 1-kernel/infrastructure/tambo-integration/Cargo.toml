[package]
name = "a2r-tambo-integration"
version = "0.1.0"
edition = "2021"
description = "Tambo Integration: UI generation from specifications and canvas protocol"

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
thiserror = "1"
presentation-kernel = { path = "../../../0-substrate/a2r-presentation-kernel" }

[dev-dependencies]
tokio-test = "0.4"
