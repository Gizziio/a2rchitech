# ============================================================================
# A2R Agent Workspace - Firejail Security Profile
# Sandboxing rules for isolated agent execution
# ============================================================================

# Profile name
?A2R_AGENT_PROFILE

# ============================================================================
# Basic Sandboxing
# ============================================================================

# Private directories (isolated from host)
private-tmp
private-dev
private-cache
private-etc alternatives,ca-certificates,fonts,group,ld.so.cache,ld.so.conf,ld.so.conf.d,locale.alias,locale.gen,localtime,machine-id,nsswitch.conf,passwd,pki,protocols,resolv.conf,rpc,services,ssl

# Read-only filesystem
read-only /

# Writable directories (agent workspace)
read-write /home/agent/workspace
read-write /tmp
read-write /var/tmp

# ============================================================================
# Network Restrictions
# ============================================================================

# Enable network filtering
netfilter

# Block specific protocols/ports
protocol unix,inet,inet6

# DNS
netfilter /etc/firejail/a2r-agent.net

# ============================================================================
# File System Restrictions
# ============================================================================

# Whitelist approach - only allow specific paths
whitelist /home/agent/workspace
whitelist /tmp
whitelist /var/tmp
whitelist /dev/null
whitelist /dev/zero
whitelist /dev/random
whitelist /dev/urandom

# Blacklist sensitive paths
blacklist /boot
blacklist /mnt
blacklist /opt
blacklist /root
blacklist /sys
blacklist /var/backups
blacklist /var/cache/apt/archives
blacklist /var/lib/dpkg
blacklist /var/log
blacklist /var/mail
blacklist /var/spool

# Deny access to sensitive files
blacklist /etc/shadow
blacklist /etc/shadow-
blacklist /etc/gshadow
blacklist /etc/gshadow-
blacklist /etc/passwd-
blacklist /etc/group-
blacklist /etc/ssh
blacklist /etc/ssl/private
blacklist /home/*/.ssh
blacklist /home/*/.gnupg
blacklist /home/*/.pki

# ============================================================================
# Resource Limits
# ============================================================================

# CPU time (seconds)
rlimit-cpu 7200

# Address space (4GB)
rlimit-as 4294967296

# Core file size (0 = disabled)
rlimit-core 0

# File size (1GB)
rlimit-fsize 1073741824

# Number of open files
rlimit-nofile 1024

# Number of processes
rlimit-nproc 1000

# Stack size (64MB)
rlimit-stack 67108864

# ============================================================================
# Capability Restrictions
# ============================================================================

# Drop all capabilities
caps.drop all

# ============================================================================
# Seccomp Filter
# ============================================================================

# Enable seccomp with custom filter
seccomp

# Allow specific syscalls
seccomp.32
seccomp.64

# Block dangerous syscalls
seccomp.drop mount,umount2,pivot_root,swapon,swapoff,reboot,sethostname,setdomainname,iopl,ioperm,create_module,init_module,delete_module,get_kernel_syms,query_module,quotactl,nfsservctl,getpmsg,putpmsg,afs_syscall,tuxcall,security,readahead,clock_settime,clock_adjtime,settimeofday,adjtimex,stime

# ============================================================================
# D-Bus Restrictions
# ============================================================================

# Disable D-Bus access
dbus-user none
dbus-system none

# ============================================================================
# Device Restrictions
# ============================================================================

# No sound
nosound

# No video
novideo

# No 3D direct rendering
no3d

# No D-Bus
nodbus

# ============================================================================
# Shell Restrictions
# ============================================================================

# Restrict shell access
shell none

# Disable interpreters if not needed
# noexec /home/agent/workspace/temp

# ============================================================================
# Environment Restrictions
# ============================================================================

# Clean environment
env-clean

# Set safe PATH
env PATH=/home/agent/.local/bin:/usr/local/bin:/usr/bin:/bin

# Set secure umask
env UMASK=077

# ============================================================================
# Memory Deny Write Execute
# ============================================================================

# Prevent writable-executable memory mappings
memory-deny-write-execute

# ============================================================================
# Restrict Namespaces
# ============================================================================

# Disable user namespaces
restrict-namespaces

# ============================================================================
# Disable User Namespaces Creation
# ============================================================================

# Prevent creating new namespaces
restrict-namespaces user

# ============================================================================
# Disable Tracing
# ============================================================================

trace no

# ============================================================================
# Disable Core Dumps
# ============================================================================

disable-mnt

# ============================================================================
# Machine ID
# ============================================================================

# Use a fake machine ID
machine-id

# ============================================================================
# Hostname
# ============================================================================

# Set a fixed hostname
hostname a2r-agent-sandbox

# ============================================================================
# DNS
# ============================================================================

# Use specific DNS servers
dns 1.1.1.1
dns 8.8.8.8

# ============================================================================
# Disable IPv6 (optional)
# ============================================================================

# restrict-ipv6

# ============================================================================
# Join or Create New Network Namespace
# ============================================================================

# Create isolated network namespace
net none

# Or join existing namespace
# netns <namespace>

# ============================================================================
# Private Home Directory
# ============================================================================

# Use fake home directory
private-home none

# ============================================================================
# Disable X11
# ============================================================================

# x11 none

# ============================================================================
# Whitelist Browser Profiles
# ============================================================================

whitelist /home/agent/.config/chromium
whitelist /home/agent/.config/firefox
read-write /home/agent/.config/chromium
read-write /home/agent/.config/firefox

# ============================================================================
# Logging
# ============================================================================

# Enable audit logging
# audit

# ============================================================================
# Additional Security Options
# ============================================================================

# Disable writing to /proc and /sys
proc read-only
sys read-only

# Disable running as root (already handled by container)
# noroot

# Disable setuid binaries
# nosetuid
