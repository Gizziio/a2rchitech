dag_id: dag_ui_rails_dak_unification
title: Rails/DAK UI Unification & Implementation
version: "1.1.0"
description: |
  Implement the hybrid Rails/DAK UI with contextual tabs, 
  professional design, full backend integration, and Console Drawer
  integration for seamless quick-access workflows.

nodes:
  # ============================================================================
  # PHASE 1: Analysis & Design Finalization
  # ============================================================================
  
  - id: n_0001
    title: Audit Existing Views
    type: analysis
    description: |
      Document current state of AgentView, RailsView, and RunnerView.
      Identify overlapping features, mock data vs real implementations,
      and store dependencies (useAgentStore vs useDakStore).
    acceptance: |
      - Spreadsheet of all 3 views with features, stores, APIs
      - List of duplicate/mock implementations to remove
      - Decision matrix for feature consolidation
    role: architect
    
  - id: n_0002
    title: Design System Specification
    type: design
    description: |
      Create final UI specification with:
      - Icon mapping (Lucide icons only, no emojis)
      - Color scheme for contexts
      - Tab layouts for each mode
      - Responsive breakpoints
    acceptance: |
      - Figma or markdown spec document
      - Icon inventory (GitBranch, ClipboardList, Activity, Mail, Settings2, History)
      - Color tokens for each context
    dependencies: [n_0001]
    role: designer
    
  - id: n_0003
    title: API Endpoint Verification
    type: analysis
    description: |
      Verify all Rails API endpoints exist and are wired correctly:
      - Plan endpoints (/v1/plan, /v1/plan/refine)
      - WIH endpoints (/v1/wihs, /v1/wihs/pickup, /v1/wihs/close)
      - Lease endpoints (/v1/leases)
      - Mail endpoints (/v1/mail/*)
      - Ledger endpoints (/v1/ledger/*)
      - Context Pack endpoints (if missing, document gaps)
    acceptance: |
      - API endpoint inventory with status
      - List of missing endpoints that need backend work
      - Test curls for each verified endpoint
    role: backend_analyst

  - id: n_0004
    title: Audit Console Drawer Views
    type: analysis
    description: |
      Analyze all 7 drawer tabs (Kanban, Terminal, Logs, Runs, Problems, Agents, Scheduler)
      for Rails/DAK integration potential. Document current data sources and mock data.
    acceptance: |
      - Matrix of all drawer tabs vs Rails/DAK APIs
      - List of tabs using mock data (Runs, Problems, Agents)
      - Integration priority list
      - Drawer/Main view sync strategy
    dependencies: [n_0001]
    role: architect

  # ============================================================================
  # PHASE 2: Store Consolidation
  # ============================================================================
  
  - id: n_0101
    title: Create Unified Store Interface
    type: implementation
    description: |
      Create a unified store that combines Rails API calls with DAK features.
      The store should expose:
      - Rails operations (plan, wih, lease, mail, ledger)
      - DAK operations (templates, snapshots, receipts)
      - Context state (current mode, selected WIH/DAG)
    acceptance: |
      - useUnifiedStore.ts created
      - All Rails service methods wrapped with error handling
      - DAK store methods integrated
      - TypeScript types exported
    dependencies: [n_0003]
    role: architect
    
  - id: n_0102
    title: Migrate RailsView to Unified Store
    type: refactoring
    description: |
      Replace useAgentStore with useUnifiedStore in RailsView.
      Remove mock data implementations for:
      - Leases (currently mock)
      - DAGs (currently mock)
      - Queue (should use real WIH list)
    acceptance: |
      - RailsView uses unified store
      - No mock data in production code
      - All API calls working to Rails backend
    dependencies: [n_0101]
    role: developer
    
  - id: n_0103
    title: Migrate RunnerView to Unified Store
    type: refactoring
    description: |
      Merge useDakStore into unified store.
      Ensure RunnerView components work with new store interface.
    acceptance: |
      - RunnerView uses unified store
      - DAK features (templates, snapshots) accessible
      - No functionality lost in migration
    dependencies: [n_0101]
    role: developer

  # ============================================================================
  # PHASE 3: Component Implementation
  # ============================================================================
  
  - id: n_0201
    title: Implement Tab Navigation Bar
    type: implementation
    description: |
      Create the persistent tab bar with 6 tabs:
      - Plan (GitBranch icon)
      - Work (ClipboardList icon)  
      - Status (Activity icon)
      - Mail (Mail icon with badge)
      - Tools (Settings2 icon)
      - Audit (History icon)
      Include context indicator and "Change Focus" dropdown.
    acceptance: |
      - TabBar component created
      - All 6 tabs render with correct icons
      - Active state styling
      - Badge support for Mail
      - Context banner visible
    dependencies: [n_0002, n_0102]
    role: frontend
    
  - id: n_0202
    title: Implement Plan Tab Content
    type: implementation
    description: |
      Build Plan tab with:
      - Natural language input (chat-style)
      - Template library panel
      - Recent plans list
      - Advanced DAG editor (collapsible)
      Backend integration for plan creation.
    acceptance: |
      - Natural language creates DAG via POST /v1/plan
      - Template execution works
      - Recent plans populated from API
      - DAG editor expandable for devs
    dependencies: [n_0201]
    role: frontend
    
  - id: n_0203
    title: Implement Work Tab Content
    type: implementation
    description: |
      Build Work tab with:
      - WIH queue with filters
      - Active work details panel
      - Lease info display
      - Context pack browser
      - Quick action buttons
    acceptance: |
      - WIH list from POST /v1/wihs
      - Pickup button calls POST /v1/wihs/pickup
      - Complete button calls POST /v1/wihs/{id}/close
      - Lease renewal works
      - Context packs visible
    dependencies: [n_0201]
    role: frontend
    
  - id: n_0204
    title: Implement Status Tab Content
    type: implementation
    description: |
      Build Status tab with:
      - System health metrics
      - Active executions list with progress
      - Lease status overview
      - Snapshot cache stats
      - Recent events feed
    acceptance: |
      - Health check from GET /health
      - Active runs displayed
      - Lease status from GET /v1/leases
      - Snapshot stats (local DAK)
      - Event feed from POST /v1/ledger/tail
    dependencies: [n_0201]
    role: frontend
    
  - id: n_0205
    title: Implement Mail Tab Content
    type: implementation
    description: |
      Build Mail tab with:
      - Thread list sidebar
      - Conversation view
      - Message composition
      - Review requests
      - Approval/rejection actions
    acceptance: |
      - Threads from POST /v1/mail/threads
      - Messages from GET /v1/mail/inbox
      - Send via POST /v1/mail/send
      - Reviews via POST /v1/mail/review and decide
    dependencies: [n_0201]
    role: frontend
    
  - id: n_0206
    title: Implement Tools Tab Content
    type: implementation
    description: |
      Build Tools tab with:
      - Template editor
      - Snapshot manager
      - Receipt query interface
      - Settings panel
    acceptance: |
      - Template CRUD operations
      - Snapshot cache management
      - Receipt search/filter
      - User preferences
    dependencies: [n_0201]
    role: frontend
    
  - id: n_0207
    title: Implement Audit Tab Content
    type: implementation
    description: |
      Build Audit tab with:
      - Timeline view of ledger events
      - Search and filters
      - Context pack details
      - Receipt evidence view
      - Export functionality
    acceptance: |
      - Timeline from POST /v1/ledger/trace
      - Context pack inspection
      - Receipt detail view
      - Export to JSON/CSV
    dependencies: [n_0201]
    role: frontend

  # ============================================================================
  # PHASE 4: Context Switching & UX
  # ============================================================================
  
  - id: n_0301
    title: Implement Context State Management
    type: implementation
    description: |
      Build context switching system:
      - Context state (planning, executing, monitoring, etc.)
      - Selected entity tracking (WIH, DAG)
      - Context change actions
      - Quick switch dropdown
    acceptance: |
      - Context banner updates correctly
      - Quick switch works
      - Context persists across tab changes
      - URL params sync with context
    dependencies: [n_0202, n_0203, n_0204, n_0205, n_0206, n_0207]
    role: frontend
    
  - id: n_0302
    title: Implement Smart Defaults
    type: implementation
    description: |
      Each tab should show contextually relevant content:
      - Plan tab: shows recent when idle, selected DAG when work active
      - Work tab: shows queue when idle, active WIH when picked up
      - Status tab: shows overview by default, drill-down when DAG selected
    acceptance: |
      - Plan tab adapts to context
      - Work tab adapts to context  
      - Status tab adapts to context
      - No jarring content switches
    dependencies: [n_0301]
    role: frontend

  # ============================================================================
  # PHASE 5: Integration & Cleanup
  # ============================================================================
  
  - id: n_0401
    title: Remove Old Views and Components
    type: cleanup
    description: |
      Delete deprecated code:
      - Old RailsView implementation
      - Old RunnerView as separate view
      - Mock data components (GlobalLeaseCenter mock, etc.)
      - Duplicate agent.store.ts methods
      - Update left rail config
    acceptance: |
      - No duplicate views exist
      - Left rail points to unified view
      - No mock data in production
      - All tests pass
    dependencies: [n_0302]
    role: developer
    
  - id: n_0402
    title: Update Navigation and Routing
    type: implementation
    description: |
      Update ShellApp and left rail:
      - Remove separate "Runner" entry
      - Update "Rails System" label if needed
      - Add URL routing for contexts
      - Deep linking support
    acceptance: |
      - /rails opens unified view
      - /rails/plan, /rails/work, etc. work
      - Left rail has correct entries
    dependencies: [n_0401]
    role: frontend
    
  - id: n_0403
    title: Error Handling and Loading States
    type: implementation
    description: |
      Add comprehensive error handling:
      - API error boundaries
      - Retry logic for failed requests
      - Loading skeletons for each tab
      - Offline indicators
    acceptance: |
      - Graceful error messages
      - Retry buttons on failures
      - No UI crashes on API errors
      - Loading states for all async ops
    dependencies: [n_0402]
    role: frontend

  # ============================================================================
  # PHASE 6: Testing & Documentation
  # ============================================================================
  
  - id: n_0501
    title: End-to-End Testing
    type: testing
    description: |
      Test complete workflows:
      - Plan → Work → Complete flow
      - Template execution flow
      - Mail coordination flow
      - Audit trail flow
      - Context switching flow
    acceptance: |
      - All 5 workflows tested manually
      - Cypress/Playwright tests written
      - No critical bugs
    dependencies: [n_0403]
    role: qa
    
  - id: n_0502
    title: Documentation
    type: documentation
    description: |
      Document the new UI:
      - User guide for each tab
      - Developer guide for unified store
      - API integration guide
      - Migration notes for old views
    acceptance: |
      - README updated
      - AGENTS.md updated
      - Code comments complete
      - User documentation published
    dependencies: [n_0501]
    role: technical_writer

  # ============================================================================
  # PHASE 7: Console Drawer Integration
  # ============================================================================
  
  - id: n_0601
    title: Wire Kanban to Rails WIH
    type: implementation
    description: |
      Replace useDagState with useUnifiedStore in KanbanBoard.
      Map WIH statuses to kanban columns (Backlog, Ready, In Progress, Blocked, Review, Done).
      Enable drag-drop status changes.
    acceptance: |
      - Kanban shows real WIHs from Rails API via POST /v1/wihs
      - Columns map to WIH statuses correctly
      - Dragging updates WIH status via API
      - Auto-refresh on WIH changes
    dependencies: [n_0101, n_0004]
    role: frontend
    
  - id: n_0602
    title: Replace Runs View with Real Data
    type: implementation
    description: |
      Replace MOCK_RUNS in RunsView with Rails API calls.
      Show DAG execution history with status, duration, timestamps.
      Add re-run functionality.
    acceptance: |
      - No mock data in RunsView
      - Shows real DAG executions from GET /v1/plans
      - Includes execution status, duration, timestamps
      - Re-run button triggers new execution
    dependencies: [n_0101, n_0004]
    role: frontend
    
  - id: n_0603
    title: Wire Orchestration View to Rails
    type: implementation
    description: |
      Replace useAgentStore with useUnifiedStore in OrchestrationView.
      Show agents based on WIH assignments from Rails.
    acceptance: |
      - Shows agents with active WIH assignments
      - Real-time status updates via store subscription
      - Current task display from WIH data
      - Agent status: Working, Waiting, etc.
    dependencies: [n_0101, n_0004]
    role: frontend
    
  - id: n_0604
    title: Align Scheduler with Rails
    type: implementation
    description: |
      Integrate SchedulerView with Rails scheduled DAGs.
      Show cron-based DAG executions from Rails API.
      Enable pause/resume of scheduled jobs.
    acceptance: |
      - Lists scheduled DAGs from Rails
      - Shows cron expressions and status
      - Pause/resume functionality works
      - Last run / next run timestamps
    dependencies: [n_0101, n_0004]
    role: frontend
    
  - id: n_0605
    title: Extend Logs View with Rails Events
    type: implementation
    description: |
      Enhance LogsView to include Rails events.
      Merge execEvents with Rails ledger events.
      Add filtering by source (local, Rails, All).
    acceptance: |
      - Logs include Rails events from POST /v1/ledger/tail
      - Filter by source: Local, Rails, All
      - Timestamps synchronized
      - Color-coded by source
    dependencies: [n_0101]
    role: frontend
    
  - id: n_0606
    title: Add Context Tab to Drawer
    type: implementation
    description: |
      Create new "Context" tab in ConsoleDrawer that always shows
      current WIH/DAG context regardless of other drawer tabs.
      Provides quick actions and summary.
    acceptance: |
      - Context tab shows active WIH details
      - Shows assigned DAG if applicable
      - Quick actions: View in main, Release, Complete
      - Updates when context changes in unified store
    dependencies: [n_0301]
    role: frontend
    
  - id: n_0607
    title: Implement Drawer/Main View Sync
    type: implementation
    description: |
      Create bidirectional sync between drawer and main view:
      - Selecting WIH in drawer → opens Work tab in main view
      - Selecting DAG in drawer → opens Plan tab in main view
      - Context changes propagate both ways via unified store
    acceptance: |
      - Clicking WIH in drawer opens Work tab
      - Clicking DAG execution opens Plan tab
      - Context changes sync immediately (no refresh)
      - No state drift between views
    dependencies: [n_0601, n_0606, n_0301]
    role: frontend

  # ============================================================================
  # PHASE 8: Left Rail Consolidation
  # ============================================================================
  
  - id: n_0701
    title: Create Unified Rail Entry
    type: implementation
    description: |
      Update rail.config.ts to replace separate "Rails System" and "Runner"
      entries with single "Agent System" entry that opens unified view.
      Keep icon as Train or change to GitBranch.
    acceptance: |
      - Single "Agent System" entry in Agents section of RAIL_CONFIG
      - Points to unified view (payload: 'rails')
      - Icon: Train or GitBranch
      - Label: "Agent System"
    dependencies: [n_0402]
    role: frontend
    
  - id: n_0702
    title: Update Code Mode Rail
    type: implementation
    description: |
      Update code.config.ts execution section:
      - Point Runs to unified view
      - Add Work Queue quick access
      - Keep Terminal as-is
    acceptance: |
      - cd-runs → unified view (not separate runner)
      - cd-queue → unified view Work tab (NEW)
      - cd-terminal → stays as terminal payload
      - All items functional
    dependencies: [n_0701]
    role: frontend
    
  - id: n_0703
    title: Remove Deprecated Rail Entries
    type: cleanup
    description: |
      Remove old rail entries after migration:
      - Remove separate 'runner' entry from RAIL_CONFIG
      - Update any hardcoded references in ShellApp
      - Verify no broken navigation
    acceptance: |
      - No duplicate navigation entries
      - No 'runner' payload in rail config
      - All rail items functional
      - No console errors
    dependencies: [n_0702]
    role: developer
    
  - id: n_0704
    title: Update View Registry
    type: implementation
    description: |
      Update ShellApp view registry:
      - Keep 'rails' pointing to unified view
      - Remove 'runner' registration or point to unified
      - Add deprecation comment for old views
    acceptance: |
      - View registry has single entry for unified view
      - No separate runner view registration
      - 'rails' payload opens unified view
    dependencies: [n_0703]
    role: developer

