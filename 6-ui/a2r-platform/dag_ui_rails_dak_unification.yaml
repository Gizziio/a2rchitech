roles:
  - id: architect
    name: System Architect
    responsibilities: |
      Design system structure, define stores,
      API contracts, and integration patterns.
      
  - id: designer
    name: UI/UX Designer
    responsibilities: |
      Create visual specifications, icon mapping,
      color schemes, and responsive layouts.
      
  - id: backend_analyst
    name: Backend API Analyst
    responsibilities: |
      Verify API endpoints, document missing features,
      test backend integration.
      
  - id: frontend
    name: Frontend Developer
    responsibilities: |
      Implement React components, tabs, forms,
      and UI interactions.
      
  - id: developer
    name: Full-Stack Developer
    responsibilities: |
      Implement store logic, API integration,
      and business logic.
      
  - id: qa
    name: Quality Assurance
    responsibilities: |
      Test workflows, write automated tests,
      verify acceptance criteria.
      
  - id: technical_writer
    name: Technical Writer
    responsibilities: |
      Document features, write user guides,
      maintain README and AGENTS.md.
