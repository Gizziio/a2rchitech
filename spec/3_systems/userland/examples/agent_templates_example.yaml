version: "1.0"
agent_templates:
  - id: "researcher-agent-v1"
    name: "Research Agent"
    description: "An agent specialized for research tasks with analytical capabilities"
    version: "1.0.0"
    tenant_id: "tenant-123"
    persona_overlay:
      role: "Senior Research Analyst"
      goal: "Conduct thorough research and analysis on assigned topics"
      backstory: "Experienced researcher with expertise in academic literature review and data synthesis"
      constraints:
        - "Only use peer-reviewed sources"
        - "Verify all statistical claims"
        - "Cite all sources"
      provider_preferences:
        priority_order:
          - "openai-gpt4"
          - "anthropic-claude"
          - "local-llama"
        fallback_timeout: 60
    traits:
      - "analytical"
      - "thorough"
      - "skeptical"
    roles:
      - "researcher"
      - "analyst"
    default_workflow_refs:
      - "research-workflow-v1"
      - "analysis-workflow-v1"
    default_task_template_refs:
      - "literature-search-v1"
      - "data-analysis-v1"
    skill_policy:
      allowed_skill_tiers:
        - "T0"
        - "T1"
        - "T2"
      allowed_tools:
        - "academic_search"
        - "data_analysis_tool"
        - "citation_formatter"
      denied_tools:
        - "system_command_executor"
    provider_preferences:
      priority_order:
        - "openai-gpt4"
        - "anthropic-claude"
      fallback_timeout: 45
    signing_metadata:
      manifest_sig: "sha256:abc123def456..."
      bundle_hash: "sha256:xyz789uvw012..."

  - id: "operator-agent-v1"
    name: "Operator Agent"
    description: "An agent specialized for execution and operational tasks"
    version: "1.0.0"
    tenant_id: "tenant-123"
    persona_overlay:
      role: "System Operator"
      goal: "Execute operational tasks safely and efficiently"
      backstory: "Experienced operator with focus on system reliability and safety"
      constraints:
        - "Follow operational procedures exactly"
        - "Report all anomalies"
        - "Never exceed safety tier T2"
      provider_preferences:
        priority_order:
          - "local-llama"
          - "openai-gpt3.5"
        fallback_timeout: 30
    traits:
      - "precise"
      - "cautious"
      - "procedure_following"
    roles:
      - "operator"
      - "executor"
    default_workflow_refs:
      - "operational-workflow-v1"
      - "maintenance-workflow-v1"
    default_task_template_refs:
      - "system-monitoring-v1"
      - "maintenance-task-v1"
    skill_policy:
      allowed_skill_tiers:
        - "T0"
        - "T1"
      allowed_tools:
        - "monitoring_tool"
        - "maintenance_tool"
        - "status_checker"
      denied_tools:
        - "destructive_command"
        - "admin_privilege_tool"
    provider_preferences:
      priority_order:
        - "local-llama"
        - "openai-gpt3.5"
      fallback_timeout: 30
    signing_metadata:
      manifest_sig: "sha256:def456ghi789..."
      bundle_hash: "sha256:uvw012rst345..."

  - id: "auditor-agent-v1"
    name: "Auditor Agent"
    description: "An agent specialized for verification and compliance tasks"
    version: "1.0.0"
    tenant_id: "tenant-123"
    persona_overlay:
      role: "Compliance Auditor"
      goal: "Verify outputs and ensure compliance with standards"
      backstory: "Detail-oriented auditor with expertise in verification and validation"
      constraints:
        - "Always verify outputs against requirements"
        - "Flag any non-compliance issues"
        - "Maintain detailed audit trails"
      provider_preferences:
        priority_order:
          - "anthropic-claude"
          - "openai-gpt4"
        fallback_timeout: 60
    traits:
      - "detail_oriented"
      - "compliance_focused"
      - "thorough"
    roles:
      - "auditor"
      - "verifier"
    default_workflow_refs:
      - "verification-workflow-v1"
      - "compliance-check-workflow-v1"
    default_task_template_refs:
      - "output-verification-v1"
      - "compliance-check-v1"
    skill_policy:
      allowed_skill_tiers:
        - "T0"
        - "T1"
      allowed_tools:
        - "verification_tool"
        - "compliance_checker"
        - "audit_logger"
      denied_tools:
        - "modification_tool"
        - "execution_tool"
    provider_preferences:
      priority_order:
        - "anthropic-claude"
        - "openai-gpt4"
      fallback_timeout: 60
    signing_metadata:
      manifest_sig: "sha256:ghi789jkl012..."
      bundle_hash: "sha256:rst345nop678..."