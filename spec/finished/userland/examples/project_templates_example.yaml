version: "1.0"
project_templates:
  - id: "research-project-v1"
    name: "Research Project Template"
    description: "Template for academic and scientific research projects"
    version: "1.0.0"
    tenant_id: "tenant-123"
    default_agents:
      - template_ref: "researcher-agent-v1"
        role_assignment: "lead_researcher"
        instance_count: 1
        allocation_strategy: "dedicated"
      - template_ref: "researcher-agent-v1"
        role_assignment: "supporting_researcher"
        instance_count: 2
        allocation_strategy: "load_balanced"
      - template_ref: "auditor-agent-v1"
        role_assignment: "compliance_auditor"
        instance_count: 1
        allocation_strategy: "round_robin"
    workflow_bundle:
      default_workflow_ref: "research-workflow-v1"
      alternative_workflows:
        - "exploratory-research-v1"
        - "literature-review-v1"
        - "experimental-design-v1"
      workflow_routing_rules:
        - condition: "topic.category == 'literature'"
          workflow_ref: "literature-review-v1"
        - condition: "complexity > 0.7"
          workflow_ref: "experimental-design-v1"
    task_template_bundle:
      default_task_templates:
        - "literature-search-v1"
        - "data-analysis-v1"
        - "hypothesis-formation-v1"
        - "source-verification-v1"
      custom_task_templates:
        - id: "experiment-design-task-v1"
          name: "Experiment Design Task"
          definition:
            input_schema:
              type: "object"
              properties:
                research_question:
                  type: "string"
                constraints:
                  type: "object"
                  properties:
                    budget:
                      type: "number"
                    timeline:
                      type: "string"
                    ethical_considerations:
                      type: "array"
                      items:
                        type: "string"
              required:
                - "research_question"
            output_schema:
              type: "object"
              properties:
                experimental_design:
                  type: "object"
                  properties:
                    hypothesis:
                      type: "string"
                    methodology:
                      type: "string"
                    variables:
                      type: "object"
                    controls:
                      type: "array"
                      items:
                        type: "string"
                    expected_outcomes:
                      type: "array"
                      items:
                        type: "string"
              required:
                - "experimental_design"
    governance_defaults:
      default_budgets:
        max_execution_time_minutes: 1440  # 24 hours
        max_tool_calls_per_minute: 60
        max_tokens_per_minute: 10000
      policy_overrides: []
    ui_preferences:
      theme: "research"
      layout: "dashboard"
      default_view: "progress_tracker"

  - id: "operational-project-v1"
    name: "Operational Project Template"
    description: "Template for operational and maintenance projects"
    version: "1.0.0"
    tenant_id: "tenant-123"
    default_agents:
      - template_ref: "operator-agent-v1"
        role_assignment: "system_operator"
        instance_count: 1
        allocation_strategy: "dedicated"
      - template_ref: "auditor-agent-v1"
        role_assignment: "compliance_monitor"
        instance_count: 1
        allocation_strategy: "round_robin"
    workflow_bundle:
      default_workflow_ref: "operational-workflow-v1"
      alternative_workflows:
        - "maintenance-workflow-v1"
        - "incident-response-v1"
        - "system-upgrade-v1"
      workflow_routing_rules:
        - condition: "priority == 'critical'"
          workflow_ref: "incident-response-v1"
        - condition: "task_type == 'upgrade'"
          workflow_ref: "system-upgrade-v1"
    task_template_bundle:
      default_task_templates:
        - "system-monitoring-v1"
        - "status-check-v1"
        - "maintenance-task-v1"
        - "incident-response-v1"
      custom_task_templates:
        - id: "system-health-check-v1"
          name: "System Health Check Task"
          definition:
            input_schema:
              type: "object"
              properties:
                system_id:
                  type: "string"
                check_depth:
                  type: "string"
                  enum: ["basic", "standard", "deep"]
                alert_thresholds:
                  type: "object"
                  properties:
                    cpu_usage:
                      type: "number"
                    memory_usage:
                      type: "number"
                    disk_usage:
                      type: "number"
                    network_latency:
                      type: "number"
              required:
                - "system_id"
            output_schema:
              type: "object"
              properties:
                system_health:
                  type: "object"
                  properties:
                    status:
                      type: "string"
                      enum: ["healthy", "warning", "critical"]
                    metrics:
                      type: "object"
                      additionalProperties:
                        type: "number"
                    alerts:
                      type: "array"
                      items:
                        type: "object"
                        properties:
                          alert_type:
                            type: "string"
                          severity:
                            type: "string"
                            enum: ["info", "warning", "critical"]
                          description:
                            type: "string"
                          timestamp:
                            type: "integer"
                    recommendations:
                      type: "array"
                      items:
                        type: "string"
              required:
                - "system_health"
    governance_defaults:
      default_budgets:
        max_execution_time_minutes: 720  # 12 hours
        max_tool_calls_per_minute: 120
        max_tokens_per_minute: 20000
      policy_overrides:
        - policy_id: "max_execution_time"
          override_value: "1200"  # 20 minutes for operational tasks
    ui_preferences:
      theme: "operations"
      layout: "monitoring"
      default_view: "system_status"