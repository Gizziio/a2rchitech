[package]
name = "a2rchitech-policy"
version = "0.1.0"
edition = "2021"
description = "A2rchitech policy engine with deny-by-default approach"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
thiserror = "1.0"
anyhow = "1.0"
tracing = "0.1"
utoipa = { version = "4.2", features = ["uuid", "chrono"] }
a2rchitech-history = { workspace = true }
a2rchitech-messaging = { workspace = true }
a2rchitech-security-governance = { workspace = true }
async-trait = "0.1"
futures = "0.3"

[dev-dependencies]
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite", "chrono", "uuid"] }
tempfile = "3.0"
