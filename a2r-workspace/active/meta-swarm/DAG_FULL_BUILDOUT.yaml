# A2R Meta-Swarm Full Buildout DAG
# Complete implementation of SwarmAgentic + Claude Swarm + ClosedLoop integration
# Production-ready, no placeholders, no stubs

metadata:
  project: A2R-Meta-Swarm
  version: "1.0.0"
  created: "2026-03-08"
  total_tasks: 127
  estimated_hours: 340

phases:
  phase_0_foundation:
    name: "Phase 0: Foundation"
    description: "Core types, project structure, and infrastructure"
    tasks:
      - id: P0.1
        name: "Create project structure"
        description: "Directory layout for meta-swarm module"
        subtasks:
          - id: P0.1.1
            name: "Create src/ directory tree"
          - id: P0.1.2
            name: "Create test directory structure"
          - id: P0.1.3
            name: "Create DAK pack templates"
          - id: P0.1.4
            name: "Setup Cargo.toml workspace"
          - id: P0.1.5
            name: "Setup package.json for TypeScript components"

      - id: P0.2
        name: "Define core types and traits"
        depends_on: [P0.1]
        subtasks:
          - id: P0.2.1
            name: "Define SwarmMode enum"
          - id: P0.2.2
            name: "Define Task classification types"
          - id: P0.2.3
            name: "Define Agent representation types"
          - id: P0.2.4
            name: "Define Execution result types"
          - id: P0.2.5
            name: "Define Knowledge types"
          - id: P0.2.6
            name: "Define Policy and governance types"

      - id: P0.3
        name: "Create error handling system"
        depends_on: [P0.2]
        subtasks:
          - id: P0.3.1
            name: "Define SwarmError enum"
          - id: P0.3.2
            name: "Implement Error trait"
          - id: P0.3.3
            name: "Create error context system"
          - id: P0.3.4
            name: "Define retry policies"

      - id: P0.4
