        depends_on: [P0.2]
        subtasks:
          - id: P0.4.1
            name: "Define Config structs"
          - id: P0.4.2
            name: "Implement config validation"
          - id: P0.4.3
            name: "Create default configs"
          - id: P0.4.4
            name: "Implement config hot-reload"

  phase_1_meta_controller:
