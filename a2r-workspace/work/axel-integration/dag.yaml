# Axel Integration Implementation DAG
# Master DAG for integrating txtx/axel patterns into a2rchitech
#
# Usage: a2r dag run --dag .a2r/work/axel-integration/dag.yaml

dag_version: 1
dag_id: "D2026-02-13-axel-integration"
title: "TxTx/Axel Integration into A2rchitech Rails"
sot: "/docs/research/txtx-axel-analysis.md"
defaults:
  gates:
    - "validator_pass"
    - "tests_green"
    - "lint_green"
  max_iterations: 5
  execution_permission:
    mode: "write_leased"

nodes:
  # =============================================================================
  # PHASE 0: Foundation & Analysis
  # =============================================================================
  - id: "N0.1"
    wih: "work_items/T0.1-vendor-setup.md"
    depends_on: []
    title: "Vendor Setup - Clone Axel Repository"
    gates:
      - "validator_pass"
    roles:
      orchestrator: "agent.orchestrator"
      builder: "agent.builder"
      validator: "agent.validator"

  - id: "N0.2"
    wih: "work_items/T0.2-code-analysis.md"
    depends_on: ["N0.1"]
    title: "Analyze Axel Codebase Structure"
    gates:
      - "validator_pass"
      - "docs_complete"
    roles:
      orchestrator: "agent.orchestrator"
      builder: "agent.builder"
      validator: "agent.validator"

  # =============================================================================
  # PHASE 1: Skills Portability System (Highest Priority)
  # =============================================================================
  - id: "N1.1"
    wih: "work_items/T1.1-skill-portability-crate.md"
    depends_on: ["N0.2"]
    title: "Create a2r-skill-portability Crate"
    gates:
      - "validator_pass"
      - "tests_green"
      - "architecture_review"
    roles:
      orchestrator: "agent.orchestrator"
      builder: "agent.builder"
      validator: "agent.validator"
      security: "agent.security"

  - id: "N1.2"
