    roles:
      orchestrator: "agent.orchestrator"
      builder: "agent.builder"
      validator: "agent.validator"

  - id: "N1.3"
    wih: "work_items/T1.3-claude-driver.md"
    depends_on: ["N1.2"]
    title: "Implement Claude Code Driver"
    gates:
      - "validator_pass"
