[package]
name = "allternit-federation"
version = "0.1.0"
edition = "2021"
authors = ["Allternit Team"]
license = "MIT"
description = "Node identity and trust graph for federation capabilities"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
tokio-stream = "0.1"
uuid = { version = "1.0", features = ["v4", "serde"] }
thiserror = "1.0"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
async-trait = "0.1"
futures = "0.3"
ed25519-dalek = { version = "2.0", features = ["std", "rand_core"] }
rand = "0.8"
sha2 = "0.10"
hex = "0.4"
base64 = "0.22"
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite", "postgres", "chrono", "uuid"] }
allternit-policy = { workspace = true }
allternit-history = { workspace = true }
allternit-messaging = { workspace = true }
allternit-data-fabric = { package = "allternit-memory-provider", path = "../../1-kernel/data/allternit-memory-provider" }
allternit-registry = { path = "../../1-kernel/control-plane/unified-registry/registry" }
allternit-tools-gateway = { workspace = true }
allternit-hooks = { path = "../../1-kernel/control-plane/allternit-agent-orchestration/hooks" }
allternit-context-router = { workspace = true }
allternit-providers = { workspace = true }
allternit-memory = { workspace = true }
allternit-agents = { path = "../../1-kernel/control-plane/allternit-agent-orchestration/agents" }
allternit-skills = { workspace = true }
allternit-workflows = { workspace = true }
allternit-runtime-core = { workspace = true }
allternit-security-governance = { workspace = true }
allternit-embodiment = { workspace = true }
allternit-orchestration = { package = "allternit-control-plane", path = "../../1-kernel/control-plane/allternit-control/control-plane" }
allternit-kernel-contracts = { workspace = true }
allternit-capsule = { package = "allternit-capsule", path = "../../1-kernel/capsule-system/allternit-capsule" }
allternit-wasm-runtime = { package = "allternit-wasm-runtime", path = "../../1-kernel/allternit-kernel/wasm-runtime" }
allternit-cloud-runner = { package = "allternit-runtime-local", path = "../../1-kernel/allternit-kernel/runtime-local-executor" }
allternit-control-plane-service = { path = "../../1-kernel/control-plane/allternit-control/control-plane-impl" }
