[package]
name = "allternit-security-governance"
version = "0.1.0"
edition = "2021"
description = "Allternit security and governance engine"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
thiserror = "1.0"
sha2 = "0.10"
hex = "0.4"
allternit-history = { workspace = true }
allternit-messaging = { workspace = true }

[dev-dependencies]
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite", "chrono", "uuid"] }
tempfile = "3.0"
