services:
  memory-mcp:
    build:
      context: ../../../../tools/cowork-integration/sources/mcp-memory-service
      dockerfile: tools/docker/Dockerfile
    ports:
      - "${MEMORY_MCP_PORT:-8761}:8000"
    volumes:
      - memory_mcp_data:/app/data
    environment:
      - MCP_MODE=http
      - MCP_MEMORY_STORAGE_BACKEND=sqlite_vec
      - MCP_MEMORY_SQLITE_PATH=/app/data/memory.db
      - MCP_MEMORY_BACKUPS_PATH=/app/data/backups
      - MCP_HTTP_PORT=8000
      - MCP_HTTP_HOST=0.0.0.0
      - MCP_API_KEY=${COWORK_MEMORY_MCP_API_KEY}
      - MCP_MEMORY_SQLITE_PRAGMAS=journal_mode=WAL,busy_timeout=15000,cache_size=20000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_RESULTS_PER_QUERY=20
      - SIMILARITY_THRESHOLD=0.7
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src
      - HF_HUB_DISABLE_TELEMETRY=1
    entrypoint: ["/usr/local/bin/docker-entrypoint-unified.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  memory_mcp_data:
