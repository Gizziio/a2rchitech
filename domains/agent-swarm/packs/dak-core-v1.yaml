# DAK Core Prompt Pack v1.0.0
# 
# This pack contains the fundamental prompts for DAK (Deterministic Agent Kernel) operation.
# All prompts are deterministic and versioned for reproducibility.

pack_id: "dak.core"
name: "DAK Core Prompts"
description: "Fundamental prompts for DAK kernel operation"
version: "1.0.0"
deterministic: true

author: "a2r-platform"
tags: ["dak", "core", "system", "required"]

# Required variables for all prompts in this pack
variables:
  - name: "agent_id"
    type: "string"
    required: true
    description: "Unique identifier for this agent instance"
  
  - name: "role"
    type: "string"
    required: true
    description: "Agent role: orchestrator, builder, validator, reviewer, security"
  
  - name: "wih_id"
    type: "string"
    required: true
    description: "Work Item Header ID"
  
  - name: "dag_id"
    type: "string"
    required: true
    description: "DAG identifier"
  
  - name: "node_id"
    type: "string"
    required: true
    description: "DAG node identifier"
  
  - name: "run_id"
    type: "string"
    required: true
    description: "Execution run identifier"
  
  - name: "context_pack_id"
    type: "string"
    required: true
    description: "Content-addressed context pack identifier"
  
  - name: "policy_bundle_id"
    type: "string"
    required: true
    description: "Policy bundle hash"
  
  - name: "capabilities"
    type: "array"
    required: false
    default: []
    description: "List of agent capabilities"

# Prompt templates
prompts:
  # System prompts for each role
  - id: "system.orchestrator"
    template: "prompts/system/orchestrator.j2"
    description: "System prompt for orchestrator agents"
  
  - id: "system.builder"
    template: "prompts/system/builder.j2"
    description: "System prompt for builder agents"
  
  - id: "system.validator"
    template: "prompts/system/validator.j2"
    description: "System prompt for validator agents"
  
  - id: "system.reviewer"
    template: "prompts/system/reviewer.j2"
    description: "System prompt for reviewer agents"
  
  - id: "system.security"
    template: "prompts/system/security.j2"
    description: "System prompt for security agents"
  
  # Tool usage prompts
  - id: "tool.pre_use"
    template: "prompts/tool/pre_use.j2"
    description: "Instructions shown before tool execution"
  
  - id: "tool.post_use"
    template: "prompts/tool/post_use.j2"
    description: "Instructions shown after tool execution"
  
  # Gate checkpoint prompts
  - id: "gate.checkpoint"
    template: "prompts/gate/checkpoint.j2"
    description: "Gate checkpoint instructions"
  
  - id: "gate.blocked"
    template: "prompts/gate/blocked.j2"
    description: "Instructions when gate blocks action"
  
  # Context management
  - id: "context.injection"
    template: "prompts/context/injection.j2"
    description: "Policy injection marker template"
