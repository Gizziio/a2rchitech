[package]
name = "allternit-meta-swarm"
version = "1.0.0"
edition = "2021"
authors = ["Allternit Team"]
description = "Meta-Swarm orchestration for Allternit - SwarmAgentic + Claude Swarm + ClosedLoop integration"
license = "MIT"
repository = "https://github.com/allternit/allternit-meta-swarm"

[dependencies]
# Core async runtime
tokio = { version = "1.35", features = ["full", "rt-multi-thread"] }
async-trait = "0.1"
futures = "0.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
toml = "0.8"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# UUID generation
uuid = { version = "1.6", features = ["v4", "serde"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# HTTP client for API calls
reqwest = { version = "0.11", features = ["json"] }

# Graph algorithms
petgraph = "0.6"

# Vector math for PSO
nalgebra = "0.32"

# Embedding similarity
simdeez = "1.0"

# Caching
lru = "0.12"

# File watching for hot reload
notify = "6.1"

# Regex for pattern matching
regex = "1.10"

# Random number generation for PSO
rand = "0.8"
rand_distr = "0.4"

# Concurrent data structures
dashmap = "5.5"
parking_lot = "0.12"

# Configuration validation
validator = { version = "0.16", features = ["derive"] }

# Command line parsing (for CLI tools)
clap = { version = "4.4", features = ["derive"] }

# Allternit-specific dependencies (these would be local path dependencies in actual project)
# allternit-substrate = { path = "../../../platform/types/allternit-substrate" }
# allternit-intent-graph-kernel = { path = "../../../platform/types/allternit-intent-graph-kernel" }
# allternit-governance = { path = "../../2-governance/allternit-governance" }

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.12"
tempfile = "3.9"
wiremock = "0.6"
criterion = { version = "0.5", features = ["async_tokio"] }

[[bench]]
name = "routing_benchmark"
harness = false

[[bench]]
name = "pso_benchmark"
harness = false
