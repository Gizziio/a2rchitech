[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "allternit-computer-use"
version = "0.1.0"
description = "Computer use domain with browser and desktop automation support"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [
    {name = "Allternit Team", email = "team@allternit.dev"}
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
    "Topic :: Software Development :: Testing",
    "Topic :: Desktop Environment",
]

dependencies = [
    "pillow>=10.0.0",
    "numpy>=1.24.0",
]

[project.optional-dependencies]
# Browser automation dependencies
browser = [
    "playwright>=1.40.0",
    "websocket-client>=1.6.0",
    "requests>=2.31.0",
]

# Desktop automation dependencies
desktop = [
    "pyautogui>=0.9.54",
    "pynput>=1.7.6",
    "Pillow>=10.0.0",
    "mss>=9.0.0",
]

desktop-macos = [
    "allternit-computer-use[desktop]",
    "pyobjc>=10.0",
    "pyobjc-framework-Quartz>=10.0",
    "pyobjc-framework-ApplicationServices>=10.0",
]

desktop-windows = [
    "allternit-computer-use[desktop]",
    "pywin32>=306; platform_system=='Windows'",
]

desktop-linux = [
    "allternit-computer-use[desktop]",
    "python3-xlib>=0.15; platform_system=='Linux'",
]

# All platform-specific desktop dependencies (auto-detects current platform)
desktop-all = [
    "allternit-computer-use[desktop]",
    "pyobjc>=10.0; platform_system=='Darwin'",
    "pyobjc-framework-Quartz>=10.0; platform_system=='Darwin'",
    "pyobjc-framework-ApplicationServices>=10.0; platform_system=='Darwin'",
    "pywin32>=306; platform_system=='Windows'",
    "python3-xlib>=0.15; platform_system=='Linux'",
]

# Operator adapter dependencies (includes desktop + aiohttp)
operator = [
    "allternit-computer-use[desktop]",
    "aiohttp>=3.8.0",
]

# All dependencies (browser + desktop + operator)
all = [
    "playwright>=1.40.0",
    "websocket-client>=1.6.0",
    "requests>=2.31.0",
    "pyautogui>=0.9.54",
    "pynput>=1.7.6",
    "mss>=9.0.0",
    "aiohttp>=3.8.0",
    "pyobjc>=10.0; platform_system=='Darwin'",
    "pyobjc-framework-Quartz>=10.0; platform_system=='Darwin'",
    "pyobjc-framework-ApplicationServices>=10.0; platform_system=='Darwin'",
    "pywin32>=306; platform_system=='Windows'",
    "python3-xlib>=0.15; platform_system=='Linux'",
]

dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
    "mypy>=1.5.0",
]

[project.urls]
Homepage = "https://github.com/allternit/computer-use"
Repository = "https://github.com/allternit/computer-use"

[tool.setuptools.packages.find]
where = ["."]
include = ["adapters*", "core*"]

[tool.setuptools.package-data]
"*" = ["*.json", "*.yaml", "*.yml"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.setuptools.cmdclass]
# Custom post-install hook would go here
# For now, users should run setup manually after install
