[package]
name = "a2r-agent-workspace"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/a2rchitect/a2rchitech"
description = "A2R Agent Workspace - 5-layer living workspace runtime for AI agents"
keywords = ["a2r", "agent", "workspace", "ai", "llm"]
categories = ["development-tools", "command-line-utilities"]
rust-version = "1.75"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Core dependencies (work with both std and wasm)
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = { version = "1.0", default-features = false }
chrono = { version = "0.4", features = ["serde"] }
sha2 = { version = "0.10" }
hex = { version = "0.4" }
thiserror = { version = "1.0", default-features = false, optional = true }

# Async (std only)
tokio = { version = "1.35", features = ["full"], optional = true }
async-trait = { version = "0.1", optional = true }
tracing = { version = "0.1", optional = true }

# File system (std only)
walkdir = { version = "2.4", optional = true }
glob = { version = "0.3", optional = true }
tempfile = { version = "3.8", optional = true }

# For checkpoints (std only)
serde_yaml = { version = "0.9", optional = true }

# Logging (std only)
log = { version = "0.4", optional = true }

# CLI dependencies (for the binary)
clap = { version = "4.0", features = ["derive"], optional = true }

# WASM dependencies
wasm-bindgen = { version = "=0.2.89", optional = true }
wasm-bindgen-futures = { version = "=0.4.39", optional = true }
js-sys = { version = "=0.3.66", optional = true }
web-sys = { version = "=0.3.66", optional = true }
serde-wasm-bindgen = { version = "=0.6.5", optional = true }
console_error_panic_hook = { version = "=0.1.7", optional = true }

[features]
default = ["std", "cli"]
std = [
    "anyhow/default",
    "thiserror",
    "tokio",
    "async-trait",
    "tracing",
    "walkdir",
    "glob",
    "tempfile",
    "serde_yaml",
    "log",
]
wasm = [
    "wasm-bindgen",
    "wasm-bindgen-futures",
    "js-sys",
    "web-sys",
    "serde-wasm-bindgen",
    "console_error_panic_hook",
    "sha2",
    "hex",
]
cli = ["clap"]

[dev-dependencies]
tokio-test = "0.4"

[[bin]]
name = "workspace-cli"
path = "src/bin/workspace_cli.rs"
required-features = ["cli"]
