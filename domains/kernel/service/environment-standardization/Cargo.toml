# OWNER: T1-A3

[package]
name = "allternit-environment"
version = "0.1.0"
edition = "2021"
description = "Environment standardization for Allternit - language detection, package managers, container runtimes"

[workspace]

[dependencies]
tokio = { version = "1.35", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
thiserror = "1.0"
sha2 = "0.10"
hex = "0.4"
tracing = "0.1"
toml = "0.8"
semver = "1.0"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.0"
