[package]
name = "allternit-session-manager"
version = "0.1.0"
edition = "2021"
description = "Allternit Session Manager - High-level session lifecycle management"
license = "MIT OR Apache-2.0"

[dependencies]
# Internal dependencies
allternit-driver-interface = { path = "../../drivers/allternit-driver-interface" }
allternit-process-driver = { path = "../allternit-process-driver" }
allternit-firecracker-driver = { path = "../allternit-firecracker-driver" }

# Apple Virtualization.framework driver (macOS only)
[target.'cfg(target_os = "macos")'.dependencies]
allternit-apple-vf-driver = { path = "../allternit-apple-vf-driver" }

# Core async
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Error handling
thiserror = "1"
anyhow = "1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Database
sqlx = { version = "0.7", features = ["sqlite", "runtime-tokio", "chrono", "uuid"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

# UUID
uuid = { version = "1", features = ["v4", "serde"] }

# Tracing
tracing = "0.1"

# Collections
dashmap = "5"

# Utils
dirs = "5"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
