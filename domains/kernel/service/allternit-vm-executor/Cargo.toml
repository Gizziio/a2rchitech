[package]
name = "allternit-vm-executor"
version = "1.1.0"
edition = "2021"
authors = ["Allternit Team"]
description = "Allternit VM Executor - Runs inside the VM to execute commands from the host"

[[bin]]
name = "allternit-vm-executor"
path = "src/main.rs"

[dependencies]
# Protocol (shared with host)
allternit-guest-agent-protocol = { path = "../../drivers/allternit-guest-agent-protocol" }

# Async runtime
tokio = { workspace = true, features = ["full", "process", "rt-multi-thread"] }
tokio-util = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt"] }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# UUIDs
uuid = { workspace = true, features = ["v4", "serde"] }

# Async trait (for drivers)
async-trait = { workspace = true }

# Channel types
tokio-stream = { workspace = true }
futures = { workspace = true }

# Byte handling
bytes = { workspace = true }

# Time
chrono = { workspace = true }

# Configuration parsing
toml = { workspace = true }
dirs = { workspace = true }

# Platform-specific VSOCK support
[target.'cfg(target_os = "linux")'.dependencies]
vsock = "0.5"

[target.'cfg(target_os = "macos")'.dependencies]
# macOS uses regular Unix sockets since it's not running in a VM
# (the executor only runs INSIDE the Linux VM)

[dev-dependencies]
tokio-test = "0.4"
