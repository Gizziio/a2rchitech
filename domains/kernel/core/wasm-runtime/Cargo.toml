[package]
name = "a2r-wasm-runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "WASM runtime for A2rchitech agentic OS - sandboxed tool execution"

[dependencies]
# WASM Runtime
wasmtime.workspace = true
wasmtime-wasi.workspace = true
wit-component = { workspace = true, features = ["dummy-module"] }

# WIT Bindings (generated)
wit-bindgen = { workspace = true }

# Serialization
serde.workspace = true
serde_json.workspace = true

# Async
tokio.workspace = true
async-trait.workspace = true

# Error handling
thiserror.workspace = true
anyhow.workspace = true

# Logging
tracing.workspace = true

# Utilities
uuid.workspace = true
chrono.workspace = true
url = "2"
reqwest = { version = "0.11", features = ["blocking"] }
a2rchitech-history = { workspace = true }

# Internal crates
a2r-capsule = { workspace = true }
a2rchitech-policy = { workspace = true }

[dev-dependencies]
tempfile.workspace = true
sqlx.workspace = true
semver.workspace = true
wit-parser = "0.220"
a2rchitech-history = { workspace = true }
a2rchitech-messaging = { workspace = true }
