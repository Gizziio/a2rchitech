[package]
name = "allternit-evaluation-harness"
version = "0.1.0"
edition = "2021"
description = "Allternit Evaluation Harness - Testing, benchmarking, and validation framework"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
reqwest = { workspace = true }
num_cpus = "1.16"
allternit-ontology-runtime = { path = "../ontology-runtime" }
allternit-dag-wih-integration = { path = "../dag-wih-integration" }
statistical = { version = "0.1", optional = true }
hdrhistogram = { version = "7.5", optional = true }

[features]
default = ["statistics"]
statistics = ["statistical", "hdrhistogram"]

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.10"
