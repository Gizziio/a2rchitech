[package]
name = "a2r-parity"
version = "0.1.0"
edition = "2021"
description = "Parity testing framework for OpenClaw strangler migration"
authors = ["A2rchitect Team"]

[lib]
name = "a2r_parity"
path = "src/lib.rs"

[[bin]]
name = "parity-test"
path = "src/bin/parity-test.rs"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["full", "fs"] }
async-trait = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true }
dirs = "5.0"
tempfile = { workspace = true }
regex = "1.0"
flate2 = "1.0"

[dev-dependencies]
tokio-test = "0.4"
