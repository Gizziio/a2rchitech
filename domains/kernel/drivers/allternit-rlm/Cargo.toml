[package]
name = "allternit-rlm"
version = "0.1.0"
edition = "2021"

[dependencies]
allternit-history = { workspace = true }
allternit-messaging = { workspace = true }
tokio = { workspace = true }
async-trait = { workspace = true }
sha2 = "0.10"
hex = "0.4"
allternit-memory = { workspace = true }
allternit-policy = { workspace = true }
allternit-registry = { path = "../../control-plane/unified-registry/registry" }
allternit-skills = { workspace = true }
allternit-tools-gateway = { workspace = true }
allternit-providers = { workspace = true }
allternit-runtime-core = { workspace = true }
allternit-context-router = { workspace = true }
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite", "chrono", "uuid"] }
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = { workspace = true }
uuid = { version = "1.10", features = ["v4", "serde"] }
