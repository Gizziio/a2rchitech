[package]
name = "allternit-tambo-napi"
version = "0.1.0"
edition = "2021"
description = "Node-API bindings for Tambo engine"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", features = ["async", "serde-json"] }
napi-derive = "2"
allternit-tambo-integration = { path = "../tambo-integration" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
chrono = "0.4"
