[package]
name = "allternit-multimodal-streaming"
version = "0.1.0"
edition = "2021"
description = "Multimodal streaming: vision and audio processing for agents"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
thiserror = "1"
futures = "0.3"
tokio-stream = "0.1"
base64 = "0.21"

[dev-dependencies]
tokio-test = "0.4"
