[package]
name = "allternit-environment-spec"
version = "0.1.0"
edition = "2021"
description = "Environment specification parser and converter for Allternit execution drivers (N5)"
authors = ["Allternit Team"]
license = "MIT OR Apache-2.0"

[dependencies]
# Core dependencies
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true, features = ["fs", "process", "io-util"] }
url = { version = "2.5", features = ["serde"] }
uuid = { workspace = true }

# OCI/Docker image handling
oci-distribution = { version = "0.11", default-features = false, features = ["rustls-tls"] }
tokio-tar = "0.3"
flate2 = "1.0"
sha2 = "0.10"
hex = "0.4"

# Filesystem operations
tempfile = "3.10"
walkdir = "2.5"
dirs = "5.0"

# Nix integration (optional)
which = "5.0"

# HTTP client for registry operations
reqwest = { version = "0.12", features = ["json", "stream"] }

[dev-dependencies]
tokio-test = "0.4"
mockito = "1.4"
pretty_assertions = "1.4"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = { workspace = true }
uuid = { workspace = true }

# Integration example dependencies
allternit-driver-interface = { path = "../allternit-driver-interface" }
allternit-process-driver = { path = "../../execution/allternit-process-driver" }
allternit-budget-metering = { path = "../../../4-services/orchestration/budget-metering" }
allternit-replay = { path = "../../../2-governance/allternit-replay" }
allternit-prewarm = { path = "../../../4-services/orchestration/allternit-prewarm" }
