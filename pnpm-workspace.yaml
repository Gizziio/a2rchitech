packages:
  # Shallow packages
  - 'agents/*'
  - 'api/*'
  - 'bin/*'
  - 'cmd/*'
  - 'domains/*'
  - 'domains/*/*'
  - 'infrastructure/*'
  - 'packages/*'
  - 'packages/@allternit/*'
  - 'platform/*'
  - 'platform/*/*'
  - 'plugins/*'
  - 'sdk/*'
  - 'services/*'
  - 'services/*/*'
  - 'surfaces/*'
  - 'surfaces/*/*'
  # Deeper nested packages (reorganization artifacts)
  - 'cmd/*/*/*'
  - 'packages/@allternit/*/*'
  - 'packages/@allternit/*/*/*'
  - 'packages/@allternit/*/*/*/*'
  - 'services/*/*/*'
  - 'services/*/*/*/*'
  - 'surfaces/*/*/*'
  - 'surfaces/*/*/*/*'
  - 'surfaces/allternit-extensions/allternit-extension/packages/*'
  # Exclusions
  - '!cmd/*/sdks'
  - '!packages/@allternit/adapters/src/**'
  - '!surfaces/allternit-platform/adapters-ts/**'

onlyBuiltDependencies:
  - '@whiskeysockets/baileys'
  - better-sqlite3
  - canvas
  - electron
  - protobufjs
  - sharp
  - sqlite3
