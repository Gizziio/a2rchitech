name: Typography Validation

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  validate-typography:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate Allternit typography rules
        run: python scripts/validate-typography.py
