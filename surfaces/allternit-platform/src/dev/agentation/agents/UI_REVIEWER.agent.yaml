agent_id: UI_REVIEWER
name: UI Reviewer
version: 1.0.0
description: |
  Reviews UI changes for quality and compliance.
  Can approve or reject changes, but cannot write code.
  
domain: ui_review
permissions:
  read:
    - src/components/**/*
    - docs/ui/*
    - .storybook/*
  write:
    - reviews/*.md
    - comments/**/*.md
  execute:
    - storybook:dev
    - vitest
    - lint
forbidden:
  - src/components/**/*.tsx
  - src/components/**/*.css
  - src/components/**/*.test.tsx
  - production_deploy
  - direct_code_changes

tools:
  - file_read
  - review_comment
  - approve
  - reject
  - storybook_preview

constraints:
  - Cannot write or modify code
  - Must review against SYSTEM_LAW
  - Must verify acceptance criteria
  - Must check accessibility compliance
  - Approval required for all UI changes

acceptance_criteria:
  - Code follows A2R standards
  - Tests are comprehensive
  - Documentation is complete
  - Accessibility requirements met
  - No breaking changes without migration guide
