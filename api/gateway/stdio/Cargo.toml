[package]
name = "gateway-stdio"
version = "0.1.0"
edition = "2021"
description = "Stdio NDJSON-RPC gateway for A2rchitech"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
async-trait = "0.1"
uuid = { version = "1.0", features = ["v4", "serde"] }
futures = "0.3"
tokio-util = { version = "0.7", features = ["codec"] }
bytes = "1.0"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tokio-test = "0.4"