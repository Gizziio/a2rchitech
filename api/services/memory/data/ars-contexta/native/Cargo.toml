[package]
name = "ars-contexta-nlp"
version = "1.0.0"
edition = "2021"
authors = ["Allternit Team"]
description = "Native NLP module for Ars Contexta using rust-bert"
license = "MIT"
repository = "https://github.com/allternit/ars-contexta"

[lib]
crate-type = ["cdylib"]

[dependencies]
# Core dependencies
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
once_cell = "1.19"

# NLP dependencies
rust-bert = { version = "0.23", optional = true }
tch = { version = "0.15", optional = true }  # PyTorch bindings for rust-bert

# Candle ML framework (lighter alternative)
candle-core = { version = "0.3", optional = true }
candle-nn = { version = "0.3", optional = true }
candle-transformers = { version = "0.3", optional = true }
tokenizers = { version = "0.15", optional = true }

# N-API for Node.js bindings
napi = { version = "2.16", default-features = false, features = ["napi9"] }
napi-derive = "2.16"

[features]
default = ["rust-bert-backend"]
rust-bert-backend = ["rust-bert", "tch"]
candle-backend = ["candle-core", "candle-nn", "candle-transformers", "tokenizers"]

[build-dependencies]
napi-build = "2.1"

[profile.release]
lto = true
strip = true
opt-level = 3
