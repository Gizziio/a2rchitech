[package]
name = "allternit-api"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "allternit-api"
path = "src/main.rs"

[features]
default = []
vm-driver = []

[dependencies]
# Web framework
axum = { version = "0.7", features = ["ws"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
tower = "0.4"
tower-http = { version = "0.5", features = ["cors"] }

# Internal crates - Rails & Cowork
allternit-agent-system-rails = { path = "../../domains/kernel/allternit-agent-system-rails" }
allternit-cowork-runtime = { path = "../../infrastructure/executor/cowork/cowork/allternit-cowork-runtime" }
allternit-driver-interface = { path = "../../domains/kernel/drivers/allternit-driver-interface" }

# Internal crates - Execution (commented out - paths don't exist)
# allternit-firecracker-driver = { path = "../../domains/kernel/execution/allternit-firecracker-driver" }
# allternit-session-manager = { path = "../../domains/kernel/execution/allternit-session-manager" }

# WebSocket
tokio-tungstenite = "0.21"
futures = "0.3"

# Utilities
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1"
anyhow = "1"
dirs = "5"
portable-pty = "0.8"
hmac = "0.12"
sha2 = "0.10"
base64 = "0.22"
async-trait = "0.1"
reqwest = { version = "0.11", features = ["json"] }

# PNG Rendering dependencies
resvg = "0.41"
usvg = "0.41"
tiny-skia = "0.11"
image = "0.24"

# PDF Rendering dependencies
printpdf = "0.6"

# Testing
[dev-dependencies]
axum-test = "14"
urlencoding = "2"

# Make this package independent from the root workspace
[workspace]
