version: "3.9"

# =============================================================================
# AllternitCHITECT PLATFORM - DEVELOPMENT DOCKER COMPOSE
# =============================================================================
# This file sets up all services for development using Docker
# Usage: docker-compose -f docker-compose.dev.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # CORE SERVICES
  # ---------------------------------------------------------------------------
  
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "${Allternit_API_PORT:-3010}:3010"
    environment:
      - Allternit_API_BIND=0.0.0.0:3010
      - Allternit_LEDGER_PATH=/data/allternit.jsonl
      - Allternit_DB_PATH=/data/allternit.db
      - Allternit_API_IDENTITY=${Allternit_API_IDENTITY:-api-service}
      - Allternit_API_TENANT=${Allternit_API_TENANT:-default}
      - Allternit_API_BOOTSTRAP_POLICY=${Allternit_API_BOOTSTRAP_POLICY:-true}
      - Allternit_API_POLICY_ENFORCE=${Allternit_API_POLICY_ENFORCE:-true}
      # AI Provider Keys (pass through from host)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    volumes:
      - allternit-data:/data
      - ./7-apps/api:/app:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - allternit-network

  # ---------------------------------------------------------------------------
  # OPTIONAL AI SERVICES
  # ---------------------------------------------------------------------------
  
  voice-service:
    build:
      context: ./4-services/ai/voice-service
      dockerfile: Dockerfile.voice
    ports:
      - "${Allternit_VOICE_PORT:-8001}:8001"
    environment:
      - PORT=8001
      - PRELOAD_MODEL=false
    volumes:
      - voice-cache:/tmp/voice-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - allternit-network
    profiles:
      - ai  # Only start with: docker-compose --profile ai up

  webvm-service:
    build:
      context: ./services/webvm-service
      dockerfile: Dockerfile.webvm
    ports:
      - "${Allternit_WEBVM_PORT:-8002}:8002"
    environment:
      - WEBVM_BASE_URL=http://localhost:8002
    volumes:
      - webvm-static:/app/static
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - allternit-network
    profiles:
      - compute

  # ---------------------------------------------------------------------------
  # CHROME STREAMING (Requires Docker profile)
  # ---------------------------------------------------------------------------
  
  chrome-stream:
    build:
      context: ./8-cloud/chrome-stream
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - Allternit_SESSION_ID=${Allternit_SESSION_ID:-}
      - Allternit_TENANT_ID=${Allternit_TENANT_ID:-}
      - Allternit_RESOLUTION=${Allternit_RESOLUTION:-1920x1080}
      - Allternit_EXTENSION_MODE=${Allternit_EXTENSION_MODE:-managed}
      - Allternit_DISABLE_BACKGROUND_THROTTLING=${Allternit_DISABLE_BACKGROUND_THROTTLING:-false}
      - SELKIES_ENCODER=${SELKIES_ENCODER:-x264enc}
    volumes:
      - chrome-profiles:/data/chrome-profile
      - chrome-downloads:/data/downloads
    shm_size: 2gb
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
    security_opt:
      - seccomp=unconfined
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - allternit-network
    profiles:
      - chrome

  coturn:
    image: coturn/coturn:latest
    container_name: allternit-coturn
    network_mode: host
    environment:
      - TURN_REALM=${TURN_REALM:-allternit.io}
      - TURN_SECRET=${TURN_SECRET:-change-this-secret-in-production}
    volumes:
      - ./8-cloud/chrome-stream/turnserver.conf:/etc/turnserver.conf:ro
    restart: unless-stopped
    profiles:
      - chrome

  # ---------------------------------------------------------------------------
  # SUPPORTING SERVICES
  # ---------------------------------------------------------------------------
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - allternit-network
    profiles:
      - cache

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=allternit
      - POSTGRES_PASSWORD=allternit
      - POSTGRES_DB=allternitchitect
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - allternit-network
    profiles:
      - database

volumes:
  allternit-data:
  voice-cache:
  webvm-static:
  chrome-profiles:
  chrome-downloads:
  redis-data:
  postgres-data:

networks:
  allternit-network:
    driver: bridge
