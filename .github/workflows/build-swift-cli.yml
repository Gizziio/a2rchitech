name: Build Swift VM Manager CLI

on:
  push:
    branches: [main]
    paths:
      - 'surfaces/allternit-desktop/native/vm-manager/**'
  workflow_dispatch:

jobs:
  build-macos:
    name: Build Swift CLI (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Swift VM manager CLI
        run: swift build -c release --package-path surfaces/allternit-desktop/native/vm-manager

      - name: Upload vm-manager-cli
        uses: actions/upload-artifact@v4
        with:
          name: vm-manager-cli-macos-arm64
          path: surfaces/allternit-desktop/native/vm-manager/.build/release/vm-manager-cli
          retention-days: 7
