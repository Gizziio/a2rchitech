name: Release A2R

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Security audit of workflow
  zizmor:
    name: Workflow Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@135698455da5c3b3e55f73f4419e481ab68cdd95 # v0.4.1
        with:
          advanced-security: false
          online-audits: false

  # Build Linux packages (.deb and .tar.gz)
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    needs: zizmor
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write  # Required for Sigstore keyless signing

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Resolve release version
        id: release_version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binary
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$BUILD_TARGET" -p a2rchitech-cli

      - name: Build .deb package
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: cargo deb -p a2rchitech-cli --no-build --target "$BUILD_TARGET"

      - name: Create .tar.gz archive
        env:
          BUILD_TARGET: ${{ matrix.target }}
          VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          mkdir -p "a2r-${VERSION}-${{ matrix.arch }}-linux"
          cp "target/${BUILD_TARGET}/release/a2rchitech" "a2r-${VERSION}-${{ matrix.arch }}-linux/a2r"
          cp README.md LICENSE "a2r-${VERSION}-${{ matrix.arch }}-linux/" 2>/dev/null || true
          tar czf "a2r-${VERSION}-${{ matrix.arch }}-linux.tar.gz" "a2r-${VERSION}-${{ matrix.arch }}-linux"

      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1

      - name: Sign artifacts
        env:
          VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          # Sign .deb package
          for deb in target/${{ matrix.target }}/debian/*.deb; do
            if [ -f "$deb" ]; then
              cosign sign-blob --yes "$deb" --output-signature="${deb}.sig" --output-certificate="${deb}.crt"
              sha256sum "$deb" > "${deb}.sha256"
              sha512sum "$deb" > "${deb}.sha512"
            fi
          done
          # Sign .tar.gz
          cosign sign-blob --yes "a2r-${VERSION}-${{ matrix.arch }}-linux.tar.gz" \
            --output-signature="a2r-${VERSION}-${{ matrix.arch }}-linux.tar.gz.sig" \
            --output-certificate="a2r-${VERSION}-${{ matrix.arch }}-linux.tar.gz.crt"
          sha256sum "a2r-${VERSION}-${{ matrix.arch }}-linux.tar.gz" > "a2r-${VERSION}-${{ matrix.arch }}-linux.tar.gz.sha256"
          sha512sum "a2r-${VERSION}-${{ matrix.arch }}-linux.tar.gz" > "a2r-${VERSION}-${{ matrix.arch }}-linux.tar.gz.sha512"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: a2r-linux-${{ matrix.arch }}
          path: |
            target/${{ matrix.target }}/debian/*.deb
            target/${{ matrix.target }}/debian/*.sig
            target/${{ matrix.target }}/debian/*.crt
            target/${{ matrix.target }}/debian/*.sha256
            target/${{ matrix.target }}/debian/*.sha512
            a2r-*-linux.tar.gz
            a2r-*-linux.tar.gz.sig
            a2r-*-linux.tar.gz.crt
            a2r-*-linux.tar.gz.sha256
            a2r-*-linux.tar.gz.sha512
          retention-days: 14

  # Build macOS universal binary and .dmg
  build-macos:
    name: Build macOS Universal
    needs: zizmor
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write  # Required for Sigstore keyless signing

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Resolve release version
        id: release_version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build x86_64 binary
        run: cargo build --release --target x86_64-apple-darwin -p a2rchitech-cli

      - name: Build aarch64 binary
        run: cargo build --release --target aarch64-apple-darwin -p a2rchitech-cli

      - name: Create universal binary
        env:
          VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          mkdir -p target/release
          lipo -create \
            target/x86_64-apple-darwin/release/a2rchitech \
            target/aarch64-apple-darwin/release/a2rchitech \
            -output target/release/a2r
          chmod +x target/release/a2r
          # Verify universal binary
          lipo -info target/release/a2r
          # Create versioned archive
          mkdir -p "a2r-${VERSION}-universal-darwin"
          cp target/release/a2r "a2r-${VERSION}-universal-darwin/"
          cp README.md LICENSE "a2r-${VERSION}-universal-darwin/" 2>/dev/null || true
          tar czf "a2r-${VERSION}-universal-darwin.tar.gz" "a2r-${VERSION}-universal-darwin"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create .dmg installer
        env:
          VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          mkdir -p "A2R Install"
          cp target/release/a2r "A2R Install/"
          cp README.md LICENSE "A2R Install/" 2>/dev/null || true
          create-dmg \
            --volname "A2R Installer" \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "a2r-${VERSION}.dmg" \
            "A2R Install/"

      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1

      - name: Sign artifacts
        env:
          VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          # Sign universal binary
          cosign sign-blob --yes "a2r-${VERSION}-universal-darwin.tar.gz" \
            --output-signature="a2r-${VERSION}-universal-darwin.tar.gz.sig" \
            --output-certificate="a2r-${VERSION}-universal-darwin.tar.gz.crt"
          sha256sum "a2r-${VERSION}-universal-darwin.tar.gz" > "a2r-${VERSION}-universal-darwin.tar.gz.sha256"
          sha512sum "a2r-${VERSION}-universal-darwin.tar.gz" > "a2r-${VERSION}-universal-darwin.tar.gz.sha512"
          # Sign .dmg
          cosign sign-blob --yes "a2r-${VERSION}.dmg" \
            --output-signature="a2r-${VERSION}.dmg.sig" \
            --output-certificate="a2r-${VERSION}.dmg.crt"
          sha256sum "a2r-${VERSION}.dmg" > "a2r-${VERSION}.dmg.sha256"
          sha512sum "a2r-${VERSION}.dmg" > "a2r-${VERSION}.dmg.sha512"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: a2r-macos-universal
          path: |
            a2r-*-universal-darwin.tar.gz
            a2r-*-universal-darwin.tar.gz.sig
            a2r-*-universal-darwin.tar.gz.crt
            a2r-*-universal-darwin.tar.gz.sha256
            a2r-*-universal-darwin.tar.gz.sha512
            a2r-*.dmg
            a2r-*.dmg.sig
            a2r-*.dmg.crt
            a2r-*.dmg.sha256
            a2r-*.dmg.sha512
          retention-days: 14

  # Build Windows installer (.msi)
  build-windows:
    name: Build Windows
    needs: zizmor
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write  # Required for Sigstore keyless signing

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc -p a2rchitech-cli

      - name: Create archive
        shell: bash
        env:
          VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          mkdir -p "a2r-${VERSION}-x86_64-windows"
          cp "target/x86_64-pc-windows-msvc/release/a2rchitech.exe" "a2r-${VERSION}-x86_64-windows/a2r.exe"
          cp README.md LICENSE "a2r-${VERSION}-x86_64-windows/" 2>/dev/null || true
          7z a "a2r-${VERSION}-x86_64-windows.zip" "a2r-${VERSION}-x86_64-windows"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: a2r-windows-x86_64
          path: |
            a2r-*-x86_64-windows.zip
          retention-days: 14

  # Create GitHub Release
  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}

      - name: Upload artifacts summary
        run: |
          echo "## Release Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Architecture | Format |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | x86_64 | .deb, .tar.gz |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | aarch64 | .deb, .tar.gz |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | universal | .dmg, .tar.gz |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | x86_64 | .zip |" >> $GITHUB_STEP_SUMMARY
