name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'surfaces/platform/**'
      - '.github/workflows/deploy-cloudflare-pages.yml'
      - 'wrangler.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        working-directory: surfaces/platform
        run: pnpm install --ignore-scripts
        
      - name: Generate Prisma Client
        working-directory: surfaces/platform
        run: pnpm prisma generate
        
      - name: Build static export
        working-directory: surfaces/platform
        run: pnpm next build
        env:
          CLOUDFLARE_PAGES: '1'
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          
      # Create project if it doesn't exist (ignore error if already exists)
      - name: Create Pages Project if needed
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create allternit-platform --production-branch=main
          
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --commit-dirty=true
