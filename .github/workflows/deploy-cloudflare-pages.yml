name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'surfaces/allternit-platform/**'
      - '.github/workflows/deploy-cloudflare-pages.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        working-directory: surfaces/allternit-platform
        run: pnpm install --ignore-scripts
        
      - name: Generate Prisma Client
        working-directory: surfaces/allternit-platform
        run: pnpm prisma generate
        
      # Debug: verify dynamic routes have generateStaticParams
      - name: Verify dynamic routes
        working-directory: surfaces/allternit-platform
        run: |
          echo "=== shell/pair/[code]/page.tsx ==="
          cat src/app/shell/pair/\[code\]/page.tsx
          echo ""
          echo "=== shell/session/[id]/page.tsx ==="
          cat src/app/shell/session/\[id\]/page.tsx
        
      # Build static export for Cloudflare Pages
      # API routes run on user's backend (BYOC), not on Cloudflare
      - name: Build static export
        working-directory: surfaces/allternit-platform
        run: |
          # Clean any cached build files
          rm -rf .next dist
          # Remove API routes for static export - they run on user's VPS
          rm -rf src/app/api
          # Build static export
          pnpm next build
        env:
          CLOUDFLARE_PAGES: '1'
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy surfaces/allternit-platform/dist --project-name=allternit-platform --branch=main
