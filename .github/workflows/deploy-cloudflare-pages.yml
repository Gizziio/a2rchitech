name: Deploy Platform to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'surfaces/allternit-platform/**'
      - 'packages/@allternit/**'
      - 'services/runtime/**'
      - '.github/workflows/deploy-cloudflare-pages.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # Install from monorepo root so all workspace:* packages resolve correctly.
      # build-cloudflare.sh must run from surfaces/allternit-platform but pnpm
      # needs the workspace root context.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Generate Prisma client
        working-directory: surfaces/allternit-platform
        run: pnpm prisma generate

      - name: Copy discovery feed to public
        # Makes discovery-pipeline.json available as a static file at /discovery-feed.json
        # so the desktop app can fetch fresh briefings from platform.allternit.com without
        # a full app rebuild. The _headers file already adds CORS for this path.
        run: |
          if [ -f surfaces/allternit-platform/src/data/discovery-pipeline.json ]; then
            cp surfaces/allternit-platform/src/data/discovery-pipeline.json surfaces/allternit-platform/public/discovery-feed.json
            echo "Copied discovery-pipeline.json to public/discovery-feed.json"
          else
            echo "No discovery-pipeline.json found, skipping"
          fi

      - name: Build static export
        working-directory: surfaces/allternit-platform
        # build-cloudflare.sh temporarily hides src/app/api, runs next build
        # with CLOUDFLARE_PAGES=1, then restores it — API routes are never
        # permanently deleted from the working tree.
        run: bash scripts/build-cloudflare.sh
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy surfaces/allternit-platform/out --project-name=allternit-platform --branch=main
