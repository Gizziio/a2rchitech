name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'surfaces/platform/**'
      - '.github/workflows/deploy-cloudflare-pages.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: surfaces/platform
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install --ignore-scripts
        
      - name: Generate Prisma Client
        run: pnpm prisma generate
        
      - name: Build with @cloudflare/next-on-pages
        run: pnpm dlx @cloudflare/next-on-pages@latest
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NPM_CONFIG_IGNORE_SCRIPTS: true
          
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy surfaces/platform/.vercel/output/static --project-name=allternit-platform --branch=main
