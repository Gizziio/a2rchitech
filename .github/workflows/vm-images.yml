name: Build VM Images

on:
  push:
    branches: [main]
    paths:
      - 'domains/kernel/service/allternit-vm-executor/**'
      - 'domains/kernel/service/allternit-vm-image-builder/**'
      - 'domains/kernel/drivers/allternit-guest-agent-protocol/**'
      - 'allternit/.github/workflows/vm-images.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version (e.g., 1.1.0)'
        required: true
        default: '1.1.0'
      upload_release:
        description: 'Upload to GitHub Releases'
        required: true
        type: boolean
        default: false

env:
  IMAGE_VERSION: ${{ github.event.inputs.version || '1.1.0' }}

jobs:
  build-images:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
            ubuntu_arch: amd64
            rust_target: x86_64-unknown-linux-gnu
          - arch: arm64
            runner: ubuntu-22.04-arm
            ubuntu_arch: arm64
            rust_target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y e2fsprogs zstd wget qemu-utils debootstrap

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: allternit-vm-executor-build-${{ matrix.arch }}

      - name: Build allternit-vm-executor
        run: |
          # Create a temporary isolated workspace to avoid broken repo workspace members
          TMP_WS="/tmp/vm-build"
          mkdir -p "$TMP_WS/domains/kernel/service"
          mkdir -p "$TMP_WS/domains/kernel/drivers"
          cp -r domains/kernel/service/allternit-vm-executor "$TMP_WS/domains/kernel/service/"
          cp -r domains/kernel/drivers/allternit-guest-agent-protocol "$TMP_WS/domains/kernel/drivers/"

          # Create minimal workspace Cargo.toml (write via echo to avoid YAML heredoc issues)
          echo '[workspace]' > "$TMP_WS/Cargo.toml"
          echo 'resolver = "2"' >> "$TMP_WS/Cargo.toml"
          echo 'members = [' >> "$TMP_WS/Cargo.toml"
          echo '    "domains/kernel/service/allternit-vm-executor",' >> "$TMP_WS/Cargo.toml"
          echo '    "domains/kernel/drivers/allternit-guest-agent-protocol",' >> "$TMP_WS/Cargo.toml"
          echo ']' >> "$TMP_WS/Cargo.toml"
          echo '' >> "$TMP_WS/Cargo.toml"
          echo '[workspace.package]' >> "$TMP_WS/Cargo.toml"
          echo 'version = "0.1.0"' >> "$TMP_WS/Cargo.toml"
          echo 'edition = "2021"' >> "$TMP_WS/Cargo.toml"
          echo 'license = "MIT"' >> "$TMP_WS/Cargo.toml"
          echo '' >> "$TMP_WS/Cargo.toml"
          echo '[workspace.dependencies]' >> "$TMP_WS/Cargo.toml"
          echo 'serde = { version = "1.0", features = ["derive"] }' >> "$TMP_WS/Cargo.toml"
          echo 'serde_json = "1.0"' >> "$TMP_WS/Cargo.toml"
          echo 'tokio = { version = "1.35", features = ["full"] }' >> "$TMP_WS/Cargo.toml"
          echo 'tokio-util = { version = "0.7", features = ["io"] }' >> "$TMP_WS/Cargo.toml"
          echo 'anyhow = "1.0"' >> "$TMP_WS/Cargo.toml"
          echo 'thiserror = "1.0"' >> "$TMP_WS/Cargo.toml"
          echo 'async-trait = "0.1"' >> "$TMP_WS/Cargo.toml"
          echo 'tracing = "0.1"' >> "$TMP_WS/Cargo.toml"
          echo 'tracing-subscriber = { version = "0.3", features = ["env-filter"] }' >> "$TMP_WS/Cargo.toml"
          echo 'chrono = { version = "0.4", features = ["serde"] }' >> "$TMP_WS/Cargo.toml"
          echo 'uuid = { version = "1.6", features = ["v4", "serde"] }' >> "$TMP_WS/Cargo.toml"
          echo 'tokio-stream = { version = "0.1", features = ["sync"] }' >> "$TMP_WS/Cargo.toml"
          echo 'futures = "0.3"' >> "$TMP_WS/Cargo.toml"
          echo 'bytes = "1.5"' >> "$TMP_WS/Cargo.toml"
          echo 'dirs = "5.0"' >> "$TMP_WS/Cargo.toml"
          echo 'toml = "0.8"' >> "$TMP_WS/Cargo.toml"

          # Fix the local path dependency in the copied executor
          sed -i 's|path = \"../../infrastructure/allternit-guest-agent-protocol\"|path = \"../../drivers/allternit-guest-agent-protocol\"|' \
            "$TMP_WS/domains/kernel/service/allternit-vm-executor/Cargo.toml"

          # Debug: verify the workspace structure
          echo "=== Workspace structure ==="
          find "$TMP_WS" -name "Cargo.toml" -exec echo "File: {}" \; -exec cat {} \;
          echo "==========================="

          cd "$TMP_WS"
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            cargo build --release -p allternit-vm-executor
          else
            cargo build --release -p allternit-vm-executor --target ${{ matrix.rust_target }}
          fi

          # Copy binary back to expected location for downstream steps
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            mkdir -p "$GITHUB_WORKSPACE/target/release"
            cp "$TMP_WS/target/release/allternit-vm-executor" \
               "$GITHUB_WORKSPACE/target/release/"
          else
            mkdir -p "$GITHUB_WORKSPACE/target/${{ matrix.rust_target }}/release"
            cp "$TMP_WS/target/${{ matrix.rust_target }}/release/allternit-vm-executor" \
               "$GITHUB_WORKSPACE/target/${{ matrix.rust_target }}/release/"
          fi

      - name: Download Ubuntu kernel and initrd
        run: |
          mkdir -p vm-images

          ARCH_SUFFIX="${{ matrix.ubuntu_arch }}"
          VMLINUX_OUT="vm-images/vmlinux-6.5.0-allternit-${{ matrix.arch }}"
          INITRD_OUT="vm-images/initrd.img-6.5.0-allternit-${{ matrix.arch }}"

          # Try the unpacked CDN path first, fall back to release path
          wget -q "https://cloud-images.ubuntu.com/releases/22.04/release/unpacked/ubuntu-22.04-server-cloudimg-${ARCH_SUFFIX}-vmlinuz-generic" \
            -O "${VMLINUX_OUT}" || \
          wget -q "https://cloud-images.ubuntu.com/releases/22.04/release/ubuntu-22.04-server-cloudimg-${ARCH_SUFFIX}-vmlinuz-generic" \
            -O "${VMLINUX_OUT}"

          wget -q "https://cloud-images.ubuntu.com/releases/22.04/release/unpacked/ubuntu-22.04-server-cloudimg-${ARCH_SUFFIX}-initrd-generic" \
            -O "${INITRD_OUT}" || \
          wget -q "https://cloud-images.ubuntu.com/releases/22.04/release/ubuntu-22.04-server-cloudimg-${ARCH_SUFFIX}-initrd-generic" \
            -O "${INITRD_OUT}"

      - name: Create rootfs image
        run: |
          ROOTFS="vm-images/ubuntu-22.04-allternit-v${IMAGE_VERSION}-${{ matrix.arch }}.ext4"

          # 3 GB ext4 image (leaves headroom for packages + workspace)
          dd if=/dev/zero of="$ROOTFS" bs=1M count=3072 status=progress
          mkfs.ext4 -L allternit-root "$ROOTFS"

          sudo mkdir -p /mnt/rootfs
          sudo mount -o loop "$ROOTFS" /mnt/rootfs

          # Bootstrap Ubuntu 22.04 minimal base (arm64 needs ports.ubuntu.com)
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            MIRROR="http://ports.ubuntu.com/ubuntu-ports/"
          else
            MIRROR="http://archive.ubuntu.com/ubuntu/"
          fi
          sudo debootstrap --arch=${{ matrix.ubuntu_arch }} --variant=minbase jammy /mnt/rootfs "$MIRROR"

          # Bind mounts for chroot
          for fs in dev proc sys; do
            sudo mount --bind /$fs /mnt/rootfs/$fs
          done

          # Install runtime packages
          sudo chroot /mnt/rootfs /bin/bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              systemd systemd-sysv udev \
              openssh-server \
              iproute2 iputils-ping \
              curl wget ca-certificates \
              git \
              bubblewrap \
              zstd \
              python3 python3-pip
            # Install Node.js 20 LTS via NodeSource
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y nodejs
            # Clean up apt caches to shrink image
            apt-get clean && rm -rf /var/lib/apt/lists/*
          "

          # Copy allternit-vm-executor into the image
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            sudo cp target/release/allternit-vm-executor /mnt/rootfs/usr/bin/
          else
            sudo cp target/${{ matrix.rust_target }}/release/allternit-vm-executor /mnt/rootfs/usr/bin/
          fi
          sudo chmod +x /mnt/rootfs/usr/bin/allternit-vm-executor

          # Configuration directory and config file
          sudo mkdir -p /mnt/rootfs/etc/allternit
          printf '%s\n' \
            'vsock_port = 8080' \
            'log_level = "info"' \
            'max_sessions = 50' \
            'workspace_path = "/workspace"' \
            '' \
            '[sandbox]' \
            'use_bubblewrap = true' \
            'network = "host"' \
            'max_memory_mb = 2048' \
            | sudo tee /mnt/rootfs/etc/allternit/vm-executor.toml > /dev/null

          # Workspace directory
          sudo mkdir -p /mnt/rootfs/workspace

          # systemd service
          printf '%s\n' \
            '[Unit]' \
            'Description=Allternit VM Executor' \
            'After=network.target' \
            '' \
            '[Service]' \
            'Type=simple' \
            'ExecStart=/usr/bin/allternit-vm-executor' \
            'Restart=always' \
            'RestartSec=5' \
            'StandardOutput=journal' \
            'StandardError=journal' \
            '' \
            '[Install]' \
            'WantedBy=multi-user.target' \
            | sudo tee /mnt/rootfs/etc/systemd/system/allternit-vm-executor.service > /dev/null

          sudo chroot /mnt/rootfs systemctl enable allternit-vm-executor.service

          # Tear down bind mounts cleanly
          for fs in sys proc dev; do
            sudo umount /mnt/rootfs/$fs 2>/dev/null || true
          done
          sudo umount /mnt/rootfs

          echo "✅ Rootfs image created: $ROOTFS"

      - name: Create image metadata
        run: |
          cd vm-images

          VMLINUX_SHA=$(sha256sum vmlinux-6.5.0-allternit-${{ matrix.arch }} | cut -d' ' -f1)
          INITRD_SHA=$(sha256sum initrd.img-6.5.0-allternit-${{ matrix.arch }} | cut -d' ' -f1)
          ROOTFS_SHA=$(sha256sum ubuntu-22.04-allternit-v${IMAGE_VERSION}-${{ matrix.arch }}.ext4 | cut -d' ' -f1)

          jq -n \
            --arg version "${IMAGE_VERSION}" \
            --arg build_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg arch "${{ matrix.arch }}" \
            --arg vmlinux "${VMLINUX_SHA}" \
            --arg initrd "${INITRD_SHA}" \
            --arg rootfs "${ROOTFS_SHA}" \
            '{
              version: $version,
              build_date: $build_date,
              architecture: $arch,
              kernel_version: "6.5.0",
              rootfs_size_mb: 3072,
              checksums: {
                vmlinux_sha256: $vmlinux,
                initrd_sha256: $initrd,
                rootfs_sha256: $rootfs
              }
            }' > version-${IMAGE_VERSION}-${{ matrix.arch }}.json

      - name: Compress images
        run: |
          cd vm-images

          # Compress rootfs with zstd (level 19 = high compression, -T0 = all cores)
          zstd -T0 -19 ubuntu-22.04-allternit-v${IMAGE_VERSION}-${{ matrix.arch }}.ext4 \
            -o ubuntu-22.04-allternit-v${IMAGE_VERSION}-${{ matrix.arch }}.ext4.zst

          rm ubuntu-22.04-allternit-v${IMAGE_VERSION}-${{ matrix.arch }}.ext4

          ls -lh

      - name: Upload to GitHub Releases
        if: github.event.inputs.upload_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: vm-images-v${{ env.IMAGE_VERSION }}
          name: VM Images v${{ env.IMAGE_VERSION }}
          body: |
            ## Allternit VM Images v${{ env.IMAGE_VERSION }}

            Linux VM images for Allternit Desktop (Apple Virtualization.framework).

            ### Available Architectures
            - `amd64` (x86_64)
            - `arm64` (aarch64)

            ### Contents per Architecture

            | File | Description |
            |------|-------------|
            | `vmlinux-6.5.0-allternit-<arch>` | Linux kernel |
            | `initrd.img-6.5.0-allternit-<arch>` | Initial ramdisk |
            | `ubuntu-22.04-allternit-v${{ env.IMAGE_VERSION }}-<arch>.ext4.zst` | Root filesystem (zstd-compressed) |
            | `version-${{ env.IMAGE_VERSION }}-<arch>.json` | Metadata and SHA256 checksums |

            ### Pre-installed
            - Ubuntu 22.04 LTS base
            - `allternit-vm-executor` service (auto-starts via systemd)
            - Node.js 20 LTS, Python 3, pip
            - Git, curl, wget, bubblewrap

            ### Usage

            Images are automatically downloaded by Allternit Desktop on first launch.
            To download manually:
            ```bash
            allternit-vm-image-builder download --version ${{ env.IMAGE_VERSION }}
            ```
          files: vm-images/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vm-images-${{ matrix.arch }}-v${{ env.IMAGE_VERSION }}
          path: vm-images/*
          retention-days: 30
