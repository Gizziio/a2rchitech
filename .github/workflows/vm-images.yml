name: Build VM Images

on:
  push:
    branches: [main]
    paths:
      - '1-kernel/execution/allternit-vm-executor/**'
      - '1-kernel/execution/allternit-vm-image-builder/**'
      - '1-kernel/infrastructure/allternit-guest-agent-protocol/**'
      - '.github/workflows/vm-images.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version (e.g., 1.1.0)'
        required: true
        default: '1.1.0'
      upload_release:
        description: 'Upload to GitHub Releases'
        required: true
        type: boolean
        default: false

env:
  IMAGE_VERSION: ${{ github.event.inputs.version || '1.1.0' }}

jobs:
  build-images:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y e2fsprogs zstd wget qemu-utils debootstrap

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: allternit-vm-executor-build

      - name: Build allternit-vm-executor
        run: |
          cargo build --release -p allternit-vm-executor

      - name: Download Ubuntu kernel and initrd
        run: |
          mkdir -p vm-images

          # Try the unpacked CDN path first, fall back to release path
          wget -q "https://cloud-images.ubuntu.com/releases/22.04/release/unpacked/ubuntu-22.04-server-cloudimg-amd64-vmlinuz-generic" \
            -O vm-images/vmlinux-6.5.0-allternit || \
          wget -q "https://cloud-images.ubuntu.com/releases/22.04/release/ubuntu-22.04-server-cloudimg-amd64-vmlinuz-generic" \
            -O vm-images/vmlinux-6.5.0-allternit

          wget -q "https://cloud-images.ubuntu.com/releases/22.04/release/unpacked/ubuntu-22.04-server-cloudimg-amd64-initrd-generic" \
            -O vm-images/initrd.img-6.5.0-allternit || \
          wget -q "https://cloud-images.ubuntu.com/releases/22.04/release/ubuntu-22.04-server-cloudimg-amd64-initrd-generic" \
            -O vm-images/initrd.img-6.5.0-allternit

      - name: Create rootfs image
        run: |
          ROOTFS="vm-images/ubuntu-22.04-allternit-v${IMAGE_VERSION}.ext4"

          # 3 GB ext4 image (leaves headroom for packages + workspace)
          dd if=/dev/zero of="$ROOTFS" bs=1M count=3072 status=progress
          mkfs.ext4 -L allternit-root "$ROOTFS"

          sudo mkdir -p /mnt/rootfs
          sudo mount -o loop "$ROOTFS" /mnt/rootfs

          # Bootstrap Ubuntu 22.04 minimal base
          sudo debootstrap --arch=amd64 --variant=minbase jammy /mnt/rootfs \
            http://archive.ubuntu.com/ubuntu/

          # Bind mounts for chroot
          for fs in dev proc sys; do
            sudo mount --bind /$fs /mnt/rootfs/$fs
          done

          # Install runtime packages
          sudo chroot /mnt/rootfs /bin/bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              systemd systemd-sysv udev \
              openssh-server \
              iproute2 iputils-ping \
              curl wget ca-certificates \
              git \
              bubblewrap \
              zstd \
              python3 python3-pip
            # Install Node.js 20 LTS via NodeSource
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y nodejs
            # Clean up apt caches to shrink image
            apt-get clean && rm -rf /var/lib/apt/lists/*
          "

          # Copy allternit-vm-executor into the image
          sudo cp target/release/allternit-vm-executor /mnt/rootfs/usr/bin/
          sudo chmod +x /mnt/rootfs/usr/bin/allternit-vm-executor

          # Configuration directory and config file
          sudo mkdir -p /mnt/rootfs/etc/allternit
          sudo tee /mnt/rootfs/etc/allternit/vm-executor.toml > /dev/null << 'EOF'
vsock_port = 8080
log_level = "info"
max_sessions = 50
workspace_path = "/workspace"

[sandbox]
use_bubblewrap = true
network = "host"
max_memory_mb = 2048
EOF

          # Workspace directory
          sudo mkdir -p /mnt/rootfs/workspace

          # systemd service
          sudo tee /mnt/rootfs/etc/systemd/system/allternit-vm-executor.service > /dev/null << 'EOF'
[Unit]
Description=Allternit VM Executor
After=network.target

[Service]
Type=simple
ExecStart=/usr/bin/allternit-vm-executor
Restart=always
RestartSec=5
StandardOutput=journal
StandardError=journal

[Install]
WantedBy=multi-user.target
EOF

          sudo chroot /mnt/rootfs systemctl enable allternit-vm-executor.service

          # Tear down bind mounts cleanly
          for fs in sys proc dev; do
            sudo umount /mnt/rootfs/$fs 2>/dev/null || true
          done
          sudo umount /mnt/rootfs

          echo "✅ Rootfs image created: $ROOTFS"

      - name: Create image metadata
        run: |
          cd vm-images

          VMLINUX_SHA=$(sha256sum vmlinux-6.5.0-allternit | cut -d' ' -f1)
          INITRD_SHA=$(sha256sum initrd.img-6.5.0-allternit | cut -d' ' -f1)
          ROOTFS_SHA=$(sha256sum ubuntu-22.04-allternit-v${IMAGE_VERSION}.ext4 | cut -d' ' -f1)

          cat > version-${IMAGE_VERSION}-amd64.json << EOF
{
  "version": "${IMAGE_VERSION}",
  "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
  "architecture": "x86_64",
  "kernel_version": "6.5.0",
  "rootfs_size_mb": 3072,
  "checksums": {
    "vmlinux_sha256": "${VMLINUX_SHA}",
    "initrd_sha256": "${INITRD_SHA}",
    "rootfs_sha256": "${ROOTFS_SHA}"
  }
}
EOF

      - name: Compress images
        run: |
          cd vm-images

          # Compress rootfs with zstd (level 19 = high compression, -T0 = all cores)
          zstd -T0 -19 ubuntu-22.04-allternit-v${IMAGE_VERSION}.ext4 \
            -o ubuntu-22.04-allternit-v${IMAGE_VERSION}.ext4.zst

          rm ubuntu-22.04-allternit-v${IMAGE_VERSION}.ext4

          ls -lh

      - name: Upload to GitHub Releases
        if: github.event.inputs.upload_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: vm-images-v${{ env.IMAGE_VERSION }}
          name: VM Images v${{ env.IMAGE_VERSION }}
          body: |
            ## Allternit VM Images v${{ env.IMAGE_VERSION }}

            Linux VM images for Allternit Desktop (Apple Virtualization.framework).

            ### Contents

            | File | Description |
            |------|-------------|
            | `vmlinux-6.5.0-allternit` | Linux kernel |
            | `initrd.img-6.5.0-allternit` | Initial ramdisk |
            | `ubuntu-22.04-allternit-v${{ env.IMAGE_VERSION }}.ext4.zst` | Root filesystem (zstd-compressed) |
            | `version-${{ env.IMAGE_VERSION }}-amd64.json` | Metadata and SHA256 checksums |

            ### Pre-installed
            - Ubuntu 22.04 LTS base
            - `allternit-vm-executor` service (auto-starts via systemd)
            - Node.js 20 LTS, Python 3, pip
            - Git, curl, wget, bubblewrap

            ### Usage

            Images are automatically downloaded by Allternit Desktop on first launch.
            To download manually:
            ```bash
            allternit-vm-image-builder download --version ${{ env.IMAGE_VERSION }}
            ```
          files: vm-images/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vm-images-x86_64-v${{ env.IMAGE_VERSION }}
          path: vm-images/*
          retention-days: 30
