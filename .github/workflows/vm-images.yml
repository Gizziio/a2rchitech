name: Build VM Images

on:
  push:
    branches: [main]
    paths:
      - '1-kernel/execution/a2r-vm-executor/**'
      - '1-kernel/execution/a2r-vm-image-builder/**'
      - '1-kernel/infrastructure/a2r-guest-agent-protocol/**'
      - '.github/workflows/vm-images.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version (e.g., 1.1.0)'
        required: true
        default: '1.1.0'
      upload_release:
        description: 'Upload to GitHub Releases'
        required: true
        type: boolean
        default: false

env:
  IMAGE_VERSION: ${{ github.event.inputs.version || '1.1.0' }}

jobs:
  # Build VM images using Docker
  build-images:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y e2fsprogs zstd wget qemu-utils

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: vm-executor-build

      - name: Build a2r-vm-executor
        run: |
          cargo build --release -p a2r-vm-executor

      - name: Download Ubuntu kernel and initrd
        run: |
          mkdir -p vm-images
          
          # Download kernel (vmlinux)
          wget -q "https://cloud-images.ubuntu.com/releases/22.04/release/unpacked/ubuntu-22.04-server-cloudimg-amd64-vmlinuz-generic" \
            -O vm-images/vmlinux-6.5.0-a2r || \
          wget -q "https://cloud-images.ubuntu.com/releases/22.04/release/ubuntu-22.04-server-cloudimg-amd64-vmlinuz-generic" \
            -O vm-images/vmlinux-6.5.0-a2r
          
          # Download initrd
          wget -q "https://cloud-images.ubuntu.com/releases/22.04/release/unpacked/ubuntu-22.04-server-cloudimg-amd64-initrd-generic" \
            -O vm-images/initrd.img-6.5.0-a2r || \
          wget -q "https://cloud-images.ubuntu.com/releases/22.04/release/ubuntu-22.04-server-cloudimg-amd64-initrd-generic" \
            -O vm-images/initrd.img-6.5.0-a2r

      - name: Create rootfs image
        run: |
          mkdir -p vm-images
          
          # Create a 2GB empty ext4 image
          dd if=/dev/zero of=vm-images/ubuntu-22.04-a2r-v${IMAGE_VERSION}.ext4 bs=1M count=2048
          mkfs.ext4 vm-images/ubuntu-22.04-a2r-v${IMAGE_VERSION}.ext4
          
          # Mount it
          sudo mkdir -p /mnt/rootfs
          sudo mount -o loop vm-images/ubuntu-22.04-a2r-v${IMAGE_VERSION}.ext4 /mnt/rootfs
          
          # Download and extract Ubuntu base
          wget -q http://cdimage.ubuntu.com/ubuntu-base/releases/22.04/release/ubuntu-base-22.04-base-amd64.tar.gz \
            -O /tmp/ubuntu-base.tar.gz
          
          sudo tar -xzf /tmp/ubuntu-base.tar.gz -C /mnt/rootfs
          
          # Install essential packages
          sudo mount --bind /dev /mnt/rootfs/dev
          sudo mount --bind /proc /mnt/rootfs/proc
          sudo mount --bind /sys /mnt/rootfs/sys
          
          sudo chroot /mnt/rootfs /bin/bash -c "
            apt-get update && \
            apt-get install -y \
              systemd systemd-sysv \
              openssh-server \
              iproute2 iputils-ping \
              curl wget \
              ca-certificates \
              nano vim \
              htop \
              git \
              nodejs npm \
              python3 python3-pip \
              bubblewrap \
              zstd
          " || echo "Some packages may have failed, continuing..."
          
          # Copy a2r-vm-executor into the image
          sudo cp target/release/a2r-vm-executor /mnt/rootfs/usr/bin/
          sudo chmod +x /mnt/rootfs/usr/bin/a2r-vm-executor
          
          # Create a2r config directory
          sudo mkdir -p /mnt/rootfs/etc/a2r
          
          # Create vm-executor config
          sudo tee /mnt/rootfs/etc/a2r/vm-executor.toml << 'EOF'
          vsock_port = 8080
          log_level = "info"
          max_sessions = 50
          workspace_path = "/workspace"
          
          [sandbox]
          use_bubblewrap = true
          network = "host"
          max_memory_mb = 2048
          EOF
          
          # Create systemd service for a2r-vm-executor
          sudo mkdir -p /mnt/rootfs/etc/systemd/system
          sudo tee /mnt/rootfs/etc/systemd/system/a2r-vm-executor.service << 'EOF'
          [Unit]
          Description=A2R VM Executor
          After=network.target
          
          [Service]
          Type=simple
          ExecStart=/usr/bin/a2r-vm-executor
          Restart=always
          RestartSec=5
          
          [Install]
          WantedBy=multi-user.target
          EOF
          
          sudo ln -sf /etc/systemd/system/a2r-vm-executor.service \
            /mnt/rootfs/etc/systemd/system/multi-user.target.wants/a2r-vm-executor.service 2>/dev/null || true
          
          # Unmount
          sudo umount /mnt/rootfs/dev 2>/dev/null || true
          sudo umount /mnt/rootfs/proc 2>/dev/null || true
          sudo umount /mnt/rootfs/sys 2>/dev/null || true
          sudo umount /mnt/rootfs
          
          echo "✅ Rootfs image created"

      - name: Create image metadata
        run: |
          cd vm-images
          
          # Calculate checksums
          VMLINUX_SHA=$(sha256sum vmlinux-6.5.0-a2r | cut -d' ' -f1)
          INITRD_SHA=$(sha256sum initrd.img-6.5.0-a2r | cut -d' ' -f1)
          ROOTFS_SHA=$(sha256sum ubuntu-22.04-a2r-v${IMAGE_VERSION}.ext4 | cut -d' ' -f1)
          
          cat > version-${IMAGE_VERSION}-amd64.json << EOF
          {
            "version": "${IMAGE_VERSION}",
            "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "architecture": "x86_64",
            "kernel_version": "6.5.0",
            "rootfs_size_mb": 2048,
            "checksums": {
              "vmlinux_sha256": "${VMLINUX_SHA}",
              "initrd_sha256": "${INITRD_SHA}",
              "rootfs_sha256": "${ROOTFS_SHA}"
            }
          }
          EOF

      - name: Compress images
        run: |
          cd vm-images
          
          # Compress rootfs with zstd
          zstd -T0 -19 ubuntu-22.04-a2r-v${IMAGE_VERSION}.ext4 -o ubuntu-22.04-a2r-v${IMAGE_VERSION}.ext4.zst
          
          # Remove uncompressed version
          rm ubuntu-22.04-a2r-v${IMAGE_VERSION}.ext4
          
          # List results
          ls -lh

      - name: Upload to GitHub Releases
        if: github.event.inputs.upload_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.IMAGE_VERSION }}
          name: VM Images v${{ env.IMAGE_VERSION }}
          body: |
            A2R VM Images v${{ env.IMAGE_VERSION }}
            
            ## Contents
            - `vmlinux-6.5.0-a2r` - Linux kernel for Firecracker
            - `initrd.img-6.5.0-a2r` - Initial ramdisk
            - `ubuntu-22.04-a2r-v${{ env.IMAGE_VERSION }}.ext4.zst` - Root filesystem (compressed)
            - `version-${{ env.IMAGE_VERSION }}-amd64.json` - Metadata and checksums
            
            ## What's Inside
            - Ubuntu 22.04 LTS base system
            - a2r-vm-executor pre-installed and configured
            - Node.js, npm, Python 3, pip
            - Git, curl, wget
            - Bubblewrap for sandboxing
            
            ## Quick Start
            
            ### Download Images
            ```bash
            a2r-vm-image-builder download --version ${{ env.IMAGE_VERSION }}
            ```
            
            ### Or Download Manually
            ```bash
            # Download compressed image
            curl -L -o ubuntu-22.04-a2r-v${{ env.IMAGE_VERSION }}.ext4.zst \
              https://github.com/Gizziio/a2rchitech/releases/download/v${{ env.IMAGE_VERSION }}/ubuntu-22.04-a2r-v${{ env.IMAGE_VERSION }}.ext4.zst
            
            # Decompress
            zstd -d ubuntu-22.04-a2r-v${{ env.IMAGE_VERSION }}.ext4.zst
            ```
            
            ## Platform Support
            - ✅ x86_64 (AMD64) - Intel/AMD processors
            
            ## macOS Users
            These images work with Firecracker microVMs. On macOS, use with A2R Desktop app which manages the VM via Apple Virtualization.framework.
          files: |
            vm-images/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vm-images-x86_64
          path: vm-images/*
          retention-days: 30
