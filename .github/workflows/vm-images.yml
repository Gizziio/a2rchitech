name: Build VM Images

on:
  push:
    branches: [main]
    paths:
      - '1-kernel/execution/a2r-vm-executor/**'
      - '1-kernel/execution/a2r-vm-image-builder/**'
      - '1-kernel/infrastructure/a2r-guest-agent-protocol/**'
      - '.github/workflows/vm-images.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version (e.g., 1.1.0)'
        required: true
        default: '1.1.0'
      upload_release:
        description: 'Upload to GitHub Releases'
        required: true
        type: boolean
        default: false

env:
  IMAGE_VERSION: ${{ github.event.inputs.version || '1.1.0' }}

jobs:
  # Build a2r-vm-executor binaries
  build-binaries:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          target: aarch64-unknown-linux-gnu

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: vm-executor-binaries

      - name: Build a2r-vm-executor (x86_64)
        run: |
          cargo build --release -p a2r-vm-executor
          mkdir -p binaries
          cp target/release/a2r-vm-executor binaries/a2r-vm-executor-x86_64

      - name: Build a2r-vm-executor (ARM64)
        run: |
          cargo build --release -p a2r-vm-executor --target aarch64-unknown-linux-gnu
          cp target/aarch64-unknown-linux-gnu/release/a2r-vm-executor binaries/a2r-vm-executor-arm64
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build a2r-vm-image-builder
        run: |
          cargo build --release -p a2r-vm-image-builder
          cp target/release/a2r-vm-image-builder binaries/

      - name: Create version metadata
        run: |
          cd binaries
          cat > version-${IMAGE_VERSION}.json << 'EOF'
          {
            "version": "${IMAGE_VERSION}",
            "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "binaries": {
              "a2r-vm-executor-x86_64": "$(sha256sum a2r-vm-executor-x86_64 | cut -d' ' -f1)",
              "a2r-vm-executor-arm64": "$(sha256sum a2r-vm-executor-arm64 | cut -d' ' -f1)",
              "a2r-vm-image-builder": "$(sha256sum a2r-vm-image-builder | cut -d' ' -f1)"
            }
          }
          EOF

      - name: Upload to GitHub Releases
        if: github.event.inputs.upload_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.IMAGE_VERSION }}
          name: VM Executor v${{ env.IMAGE_VERSION }}
          body: |
            A2R VM Executor Binaries v${{ env.IMAGE_VERSION }}
            
            ## Binaries
            - `a2r-vm-executor-x86_64` - VM executor for x86_64 VMs
            - `a2r-vm-executor-arm64` - VM executor for ARM64 VMs
            - `a2r-vm-image-builder` - Tool to download/build VM images
            
            ## Quick Start
            
            ### Download Pre-built Images
            ```bash
            cargo run --release -p a2r-vm-image-builder -- download
            ```
            
            ### Build Images Locally (Linux only)
            ```bash
            cargo run --release -p a2r-vm-image-builder -- build
            ```
            
            ## Platform Support
            - ✅ x86_64 (AMD64)
            - ✅ aarch64 (ARM64) - Apple Silicon
          files: |
            binaries/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vm-executor-binaries
          path: binaries/*
          retention-days: 30
