name: Deploy Platform to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'surfaces/platform/**'
      - '.github/workflows/deploy-platform.yml'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'surfaces/platform/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'

env:
  VERCEL_ORG_ID: team_95y07fz0Hfm77hZMHdsQj4mQ
  VERCEL_PROJECT_ID: prj_veXmWY1vWUn6N9aBWA4gTRyeSmrx

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        working-directory: surfaces/platform
        run: pnpm install --ignore-scripts
        
      - name: Generate Prisma Client
        working-directory: surfaces/platform
        run: pnpm prisma generate
        
      - name: Build Next.js App
        working-directory: surfaces/platform
        run: pnpm next build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify Build Output
        working-directory: surfaces/platform
        run: |
          echo "=== Build Output Structure ==="
          ls -la .next/
          echo ""
          echo "=== Checking for routes-manifest.json ==="
          if [ -f ".next/routes-manifest.json" ]; then
            echo "✓ routes-manifest.json exists"
            head -20 .next/routes-manifest.json
          else
            echo "✗ routes-manifest.json NOT found"
            exit 1
          fi
          echo ""
          echo "=== Build Size ==="
          du -sh .next/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: surfaces/platform/.next/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only deploy on main branch pushes, not PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        working-directory: surfaces/platform
        run: pnpm install --ignore-scripts
        
      - name: Generate Prisma Client
        working-directory: surfaces/platform
        run: pnpm prisma generate
        
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
        
      # NOTE: The Vercel project likely has Root Directory set to "surfaces/platform"
      # When running from repo root with --cwd, vercel commands should work correctly.
      # If there are path issues, the Root Directory setting in Vercel dashboard
      # needs to be changed to "./" (root) or removed.
      
      - name: Pull Vercel Environment Information
        # Run from repo root, CLI will use the project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        
      - name: Build with Vercel
        # Build from the platform directory
        working-directory: surfaces/platform
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        
      - name: Deploy to Vercel
        # Deploy from the platform directory where .vercel/output was created
        working-directory: surfaces/platform
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
