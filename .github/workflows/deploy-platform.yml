name: Deploy Platform to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'surfaces/allternit-platform/**'
      - '.github/workflows/deploy-platform.yml'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'surfaces/allternit-platform/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'

env:
  VERCEL_ORG_ID: team_95y07fz0Hfm77hZMHdsQj4mQ
  VERCEL_PROJECT_ID: prj_veXmWY1vWUn6N9aBWA4gTRyeSmrx

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        working-directory: surfaces/allternit-platform
        run: pnpm install --ignore-scripts
        
      - name: Generate Prisma Client
        working-directory: surfaces/allternit-platform
        run: pnpm prisma generate
        
      - name: Build Next.js App
        working-directory: surfaces/allternit-platform
        run: pnpm next build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify Build Output
        working-directory: surfaces/allternit-platform
        run: |
          echo "=== Build Output Structure ==="
          ls -la .next/
          echo ""
          echo "=== Checking for routes-manifest.json ==="
          if [ -f ".next/routes-manifest.json" ]; then
            echo "✓ routes-manifest.json exists"
            head -20 .next/routes-manifest.json
          else
            echo "✗ routes-manifest.json NOT found"
            exit 1
          fi
          echo ""
          echo "=== Build Size ==="
          du -sh .next/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: surfaces/allternit-platform/.next/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only deploy on main branch pushes, not PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        working-directory: surfaces/allternit-platform
        run: pnpm install --ignore-scripts
        
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
        
      # VERCEL PROJECT SETTINGS (as of 2026-04-07):
      # ✓ Root Directory: "surfaces/allternit-platform"
      # ✓ Build Command: "next build"
      # ✓ Output Directory: ".next"
      # ✓ Install Command: "pnpm install --no-frozen-lockfile --ignore-scripts"
      
      - name: Pull Vercel Environment Information
        # Run from repo root - Vercel will use Root Directory: surfaces/allternit-platform
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        
      - name: Generate Prisma Client (for Linux)
        # Generate Prisma client for the correct binary target (debian-openssl-3.0.x)
        working-directory: surfaces/allternit-platform
        run: |
          # Remove any cached Prisma client
          rm -rf src/generated/prisma
          # Generate fresh for Linux
          pnpm prisma generate
        
      - name: Build with Vercel
        # Run from repo root - Vercel will use Root Directory: surfaces/allternit-platform
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        
      - name: Deploy to Vercel
        # Run from repo root - Vercel will use Root Directory: surfaces/allternit-platform
        run: |
          # Attempt deployment but don't fail on rate limiting
          set +e
          DEPLOY_OUTPUT=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1)
          DEPLOY_EXIT_CODE=$?
          set -e
          
          echo "$DEPLOY_OUTPUT"
          
          if [ $DEPLOY_EXIT_CODE -ne 0 ]; then
            if echo "$DEPLOY_OUTPUT" | grep -q "api-deployments-free-per-day"; then
              echo "⚠️ Vercel rate limit hit (100 deployments/day). Build succeeded but deployment skipped."
              echo "The site will auto-deploy via Git integration when the rate limit resets."
              exit 0
            else
              echo "❌ Deployment failed with error"
              exit $DEPLOY_EXIT_CODE
            fi
          fi
          
          echo "✅ Deployment successful!"
