version: "3.9"

services:
  intent-graph-kernel:
    build: ./crates/intent-graph-kernel
    ports:
      - "3005:3005"
    environment:
      RUST_LOG: info
    volumes:
      - allternit-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  capsule-runtime:
    build: ./crates/capsule-runtime
    ports:
      - "3006:3006"
    environment:
      RUST_LOG: info
    volumes:
      - allternit-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  presentation-kernel:
    build: ./crates/presentation-kernel
    ports:
      - "3007:3007"
    environment:
      RUST_LOG: info
    volumes:
      - allternit-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3007/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  pattern-recognizer:
    build: ./services/pattern-service
    ports:
      - "3008:3008"
    environment:
      RUST_LOG: info
    volumes:
      - allternit-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3008/health"]
      interval: 10s
      timeout: 3s
      retries: 5
  
  voice-service:
    build:
      context: ./4-services/ai/voice-service
      dockerfile: Dockerfile.voice
    ports:
      - "8001:8001"
    volumes:
      - ./audio:/tmp/voice-service
    environment:
      PRELOAD_MODEL: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 3s
      retries: 5
  
  webvm-service:
    build:
      context: ./services/webvm-service
      dockerfile: Dockerfile.webvm
    ports:
      - "8002:8002"
    volumes:
      - ./webvm-static:/app/static
    environment:
      WEBVM_BASE_URL: "http://localhost:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 3s
      retries: 5
  
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      Allternit_API_BIND: ${Allternit_API_BIND:-0.0.0.0:3000}
      Allternit_LEDGER_PATH: ${Allternit_LEDGER_PATH:-/data/allternit.jsonl}
      Allternit_DB_PATH: ${Allternit_DB_PATH:-/data/allternit.db}
      Allternit_API_IDENTITY: ${Allternit_API_IDENTITY:-api-service}
      Allternit_API_TENANT: ${Allternit_API_TENANT:-default}
      Allternit_API_BOOTSTRAP_POLICY: ${Allternit_API_BOOTSTRAP_POLICY:-true}
      Allternit_API_POLICY_ENFORCE: ${Allternit_API_POLICY_ENFORCE:-true}
      TURN_SECRET: ${TURN_SECRET:-change-this-secret-in-production}
      TURN_REALM: ${TURN_REALM:-allternit.io}
    volumes:
      - allternit-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Chrome Streaming Gateway - Real Chrome via WebRTC
  chrome-stream:
    build:
      context: ./8-cloud/chrome-stream
      dockerfile: Dockerfile
    profiles:
      - chrome  # Only start with: docker-compose --profile chrome up
    environment:
      - Allternit_SESSION_ID=${Allternit_SESSION_ID:-}
      - Allternit_TENANT_ID=${Allternit_TENANT_ID:-}
      - Allternit_RESOLUTION=${Allternit_RESOLUTION:-1920x1080}
      - Allternit_EXTENSION_MODE=${Allternit_EXTENSION_MODE:-managed}
      - Allternit_DISABLE_BACKGROUND_THROTTLING=${Allternit_DISABLE_BACKGROUND_THROTTLING:-false}
      - SELKIES_ENCODER=${SELKIES_ENCODER:-x264enc}
    volumes:
      - chrome-profiles:/data/chrome-profile
      - chrome-downloads:/data/downloads
    shm_size: 2gb
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
    security_opt:
      - seccomp=/etc/allternit/seccomp/chrome-sandbox.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - chrome-egress

  # coturn - WebRTC TURN server for NAT traversal
  coturn:
    image: coturn/coturn:latest
    container_name: allternit-coturn
    profiles:
      - chrome
    network_mode: host
    environment:
      - TURN_REALM=${TURN_REALM:-allternit.io}
      - TURN_SECRET=${TURN_SECRET:-change-this-secret-in-production}
    volumes:
      - ./8-cloud/chrome-stream/turnserver.conf:/etc/turnserver.conf:ro
    restart: unless-stopped

volumes:
  allternit-data:
  chrome-profiles:
    driver: local
  chrome-downloads:
    driver: local

networks:
  chrome-egress:
    driver: bridge
    internal: false  # Allow outbound internet access
