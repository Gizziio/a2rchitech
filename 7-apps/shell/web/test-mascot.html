<!DOCTYPE html>
<html>
<head>
  <title>Mascot Test</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; }
    #root { height: 100vh; display: flex; flex-direction: column; }
    .chat-area { flex: 1; padding: 20px; }
    .input-bar { 
      position: relative;
      height: 60px; 
      background: #2a2a2a; 
      border-top: 1px solid #444;
      display: flex;
      align-items: center;
      padding: 0 20px;
    }
    .mode-buttons {
      position: absolute;
      top: -40px;
      right: 20px;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 8px 16px;
      background: #444;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #555; }
    button.active { background: #0066cc; }
    .agent-toggle {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
