[package]
name = "a2rchitech-skills"
version = "0.1.0"
edition = "2021"
description = "A2rchitech skills system with manifest parsing and validation"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
utoipa = { version = "4.2", features = ["uuid", "chrono"] }
a2rchitech-history = { workspace = true }
a2rchitech-messaging = { workspace = true }
a2rchitech-policy = { workspace = true }
a2rchitech-tools-gateway = { workspace = true }
async-trait = { workspace = true }
sqlx = { workspace = true }
futures = "0.3"
regex = "1.0"
ring = "0.17"
data-encoding = "2.0"
# Screen recording dependencies
image = { version = "0.24", default-features = false, features = ["png", "jpeg", "gif"] }
gif = "0.13"
weezl = "0.1"  # GIF encoding

walkdir = "2.5"
zip = { version = "0.6", default-features = false, features = ["deflate"] }
sha2 = "0.10"

[dev-dependencies]
tempfile = { workspace = true }