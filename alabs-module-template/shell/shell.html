<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{MODULE_TITLE}} — A://Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ================================================================
       A://Labs Module Template — Shared Styles
       ================================================================ */

    :root {
      --bg: #0b0b0c;
      --surface: #151517;
      --surface-raised: #1c1c1f;
      --border: #27272a;
      --border-light: #3f3f46;
      --text: #e5e5e5;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: {{ACCENT_COLOR}};
      --accent-dim: {{ACCENT_DIM}};
      --accent-glow: {{ACCENT_GLOW}};
      --success: #22c55e;
      --error: #ef4444;
      --info: #3b82f6;
      --code-bg: #0f0f11;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 80px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Progress Bar */
    #progress-container {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--surface);
      z-index: 1000;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), {{ACCENT_LIGHT}});
      box-shadow: 0 0 12px var(--accent-glow);
      transition: width 0.2s ease;
    }

    /* Navigation */
    nav {
      position: fixed;
      top: 3px; left: 0; right: 0;
      background: rgba(11, 11, 12, 0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      z-index: 999;
      padding: 0 24px;
    }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .nav-logo {
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .nav-logo span {
      color: var(--accent);
    }
    .nav-links {
      display: flex;
      gap: 6px;
      list-style: none;
    }
    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--accent);
      background: var(--accent-dim);
    }
    .nav-tier {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 3px 8px;
      border-radius: 4px;
    }
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.4rem;
      cursor: pointer;
    }
    @media (max-width: 768px) {
      .nav-links { display: none; position: absolute; top: 56px; left: 0; right: 0; background: var(--surface); flex-direction: column; padding: 12px; gap: 4px; border-bottom: 1px solid var(--border); }
      .nav-links.open { display: flex; }
      .nav-toggle { display: block; }
    }

    /* Sections */
    section {
      padding: 80px 24px;
      max-width: 860px;
      margin: 0 auto;
      position: relative;
    }

    /* Hero */
    .hero {
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding-top: 100px;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid {{ACCENT_BADGE_BORDER}};
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 24px;
    }
    .hero-badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 20px;
    }
    .hero h1 em {
      color: var(--accent);
      font-style: normal;
    }
    .hero p {
      font-size: 1.15rem;
      color: var(--text-secondary);
      max-width: 600px;
      margin-bottom: 32px;
      line-height: 1.7;
    }
    .hero-meta {
      display: flex;
      gap: 24px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* Content Typography */
    h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 32px 0 12px;
      color: var(--text);
    }
    h4 {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 24px 0 8px;
      color: var(--text-secondary);
    }
    p {
      margin-bottom: 16px;
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.7;
    }
    ul, ol {
      margin: 16px 0;
      padding-left: 24px;
      color: var(--text-secondary);
    }
    li {
      margin-bottom: 8px;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    strong { color: var(--text); font-weight: 600; }
    em { color: var(--accent); font-style: normal; }

    /* Code Blocks */
    .code-block {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin: 20px 0;
    }
    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--border);
    }
    .code-lang {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    .code-copy {
      font-size: 0.7rem;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .code-copy:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
    pre {
      padding: 16px 20px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      color: var(--text);
    }
    code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      color: var(--accent);
      background: rgba(245,158,11,0.08);
      padding: 2px 5px;
      border-radius: 3px;
    }
    pre code {
      background: none;
      padding: 0;
      color: inherit;
      font-size: inherit;
    }
    .token-keyword { color: #c678dd; }
    .token-string { color: #98c379; }
    .token-number { color: #d19a66; }
    .token-comment { color: #5c6370; font-style: italic; }
    .token-function { color: #61afef; }
    .token-type { color: #e5c07b; }
    .token-operator { color: #56b6c2; }

    /* Callouts */
    .callout {
      padding: 16px 20px;
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      background: var(--accent-dim);
      margin: 20px 0;
    }
    .callout.info {
      border-left-color: var(--info);
      background: rgba(59,130,246,0.08);
    }
    .callout.success {
      border-left-color: var(--success);
      background: rgba(34,197,94,0.08);
    }
    .callout.error {
      border-left-color: var(--error);
      background: rgba(239,68,68,0.08);
    }
    .callout p { margin: 0; color: var(--text-secondary); }
    .callout strong { color: var(--text); }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 0.88rem;
    }
    th, td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      font-weight: 600;
      color: var(--text);
      background: var(--surface);
    }
    td { color: var(--text-secondary); }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 60px 0;
      border: none;
    }

    /* Scroll Reveal */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Quiz */
    .quiz {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin: 24px 0;
    }
    .quiz-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .quiz-num {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent-dim);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    .quiz h3 { margin: 0; font-size: 1rem; }
    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .quiz-option {
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .quiz-option:hover { border-color: var(--border-light); }
    .quiz-option.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--text); }
    .quiz-option.correct { border-color: var(--success); background: rgba(34,197,94,0.1); }
    .quiz-option.wrong { border-color: var(--error); background: rgba(239,68,68,0.1); }
    .quiz-option .radio {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border-light);
      border-radius: 50%;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .quiz-option.selected .radio { border-color: var(--accent); }
    .quiz-option.correct .radio { border-color: var(--success); background: var(--success); }
    .quiz-option.wrong .radio { border-color: var(--error); background: var(--error); }
    .quiz-feedback {
      display: none;
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .quiz-feedback.show { display: block; }
    .quiz-feedback.correct { background: rgba(34,197,94,0.1); color: #86efac; border: 1px solid rgba(34,197,94,0.3); }
    .quiz-feedback.wrong { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
    .quiz-retry {
      margin-top: 12px;
      padding: 8px 16px;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      display: none;
    }
    .quiz-retry.show { display: inline-block; }
    .quiz-retry:hover { border-color: var(--accent); color: var(--accent); }

    /* Capstone */
    .capstone {
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface-raised) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      margin: 40px 0;
    }
    .capstone h2 { margin-top: 0; }
    .capstone-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .capstone-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .capstone-item h4 {
      color: var(--accent);
      margin-top: 0;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .capstone-item p { font-size: 0.85rem; margin: 0; }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 24px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    footer code {
      background: none;
      color: var(--text-muted);
    }

    /* Module-specific styles injection point */
    {{MODULE_CSS}}
  </style>
</head>
<body>
  <div id="progress-container"><div id="progress-bar"></div></div>

  <nav>
    <div class="nav-inner">
      <div class="nav-logo">A://<span>Labs</span></div>
      <ul class="nav-links" id="navLinks">
        {{NAV_LINKS}}
      </ul>
      <span class="nav-tier">{{TIER}}</span>
      <button class="nav-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')">☰</button>
    </div>
  </nav>

  {{MODULE_CONTENT}}

  <footer>
    <p>A://Labs — {{TIER}} Tier — {{MODULE_TITLE}}</p>
    <p style="margin-top:4px;">Generated from <code>{{SOURCE_PACKAGE}}</code> · Allternit Internal</p>
  </footer>

  <script>
    // ========================
    // Shared: Scroll Progress & Nav
    // ========================
    const progressBar = document.getElementById('progress-bar');
    const navLinks = document.querySelectorAll('.nav-links a');
    const sections = document.querySelectorAll('section[id], section[class*="reveal"]');

    function updateProgress() {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const pct = (scrollTop / docHeight) * 100;
      progressBar.style.width = pct + '%';

      let current = '';
      sections.forEach(sec => {
        const top = sec.offsetTop - 100;
        if (scrollTop >= top) {
          current = sec.getAttribute('id') || '';
        }
      });
      navLinks.forEach(link => {
        link.classList.toggle('active', link.dataset.section === current);
      });
    }
    window.addEventListener('scroll', updateProgress, { passive: true });
    updateProgress();

    // ========================
    // Shared: Scroll Reveal
    // ========================
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.08 });
    document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

    // ========================
    // Shared: Quiz Engine
    // ========================
    window.QuizEngine = {
      answers: {},
      feedback: {},

      init(answers, feedback) {
        this.answers = answers;
        this.feedback = feedback;
      },

      selectOption(el, quizNum, optionIdx) {
        const quizEl = document.getElementById('quiz' + quizNum);
        const options = quizEl.querySelectorAll('.quiz-option');
        const feedback = document.getElementById('feedback' + quizNum);
        const retryBtn = document.getElementById('retry' + quizNum);

        // Disable all options
        options.forEach(opt => {
          opt.style.pointerEvents = 'none';
          opt.classList.remove('selected');
        });
        el.classList.add('selected');

        const correct = this.answers[quizNum] === optionIdx;
        if (correct) {
          el.classList.add('correct');
          feedback.className = 'quiz-feedback show correct';
          feedback.textContent = this.feedback[quizNum].correct;
        } else {
          el.classList.add('wrong');
          options[this.answers[quizNum]].classList.add('correct');
          feedback.className = 'quiz-feedback show wrong';
          feedback.textContent = this.feedback[quizNum].wrong;
          if (retryBtn) retryBtn.classList.add('show');
        }
      },

      reset(quizNum) {
        const quizEl = document.getElementById('quiz' + quizNum);
        const options = quizEl.querySelectorAll('.quiz-option');
        const feedback = document.getElementById('feedback' + quizNum);
        const retryBtn = document.getElementById('retry' + quizNum);

        options.forEach(opt => {
          opt.style.pointerEvents = '';
          opt.classList.remove('selected', 'correct', 'wrong');
        });
        feedback.className = 'quiz-feedback';
        feedback.textContent = '';
        if (retryBtn) retryBtn.classList.remove('show');
      }
    };

    // Alias for backward compatibility
    function selectOption(el, quizNum, optionIdx) {
      window.QuizEngine.selectOption(el, quizNum, optionIdx);
    }

    // ========================
    // Shared: Code Copy
    // ========================
    document.querySelectorAll('.code-copy').forEach(btn => {
      btn.addEventListener('click', () => {
        const pre = btn.closest('.code-block').querySelector('pre');
        navigator.clipboard.writeText(pre.textContent).then(() => {
          btn.textContent = 'Copied!';
          setTimeout(() => btn.textContent = 'Copy', 1500);
        });
      });
    });

    // ========================
    // Module-specific JS injection point
    // ========================
    {{MODULE_JS}}
  </script>
</body>
</html>
