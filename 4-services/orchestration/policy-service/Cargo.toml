[package]
name = "policy-service"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Policy Service - HTTP API for policy decisions and access control"

[[bin]]
name = "policy-service"
path = "src/main.rs"

[dependencies]
axum = { workspace = true, features = ["ws", "macros"] }
tokio = { workspace = true, features = ["full"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
anyhow.workspace = true
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tower-http = { workspace = true, features = ["cors"] }
chrono = { workspace = true, features = ["serde"] }
uuid = { workspace = true, features = ["v4", "serde"] }
reqwest = { workspace = true, features = ["json", "rustls-tls"] }

a2rchitech-policy = { workspace = true }
a2r-security-hardening = { path = "../../../2-governance/security-network/security-hardening" }
a2r-purpose-binding = { path = "../../../2-governance/identity-access-control/purpose-binding" }
a2r-policy-tier-gating = { path = "../../../2-governance/identity-access-control/policy-tier-gating" }

[dev-dependencies]
tokio-test = "0.4"
tower = { workspace = true }
