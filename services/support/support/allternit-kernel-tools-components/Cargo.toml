[package]
name = "a2rchitech-tools"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
tokio = { version = "1.0", features = ["full"] }
reqwest = { workspace = true, features = ["json"] }
scraper = "0.18"
url = "2.5"
uuid = { version = "1.0", features = ["v4"] }
chrono = "0.4"
