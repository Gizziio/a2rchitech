[package]
name = "a2rchitech-tools-gateway"
version = "0.1.0"
edition = "2021"
description = "A2R IO Service - The ONLY permitted side-effect path with sandboxed execution and policy enforcement"

[[bin]]
name = "a2r-io-service"
path = "src/main.rs"

[dependencies]
# Core
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
thiserror = "1.0"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
chrono = { version = "0.4", default-features = false, features = ["std", "clock"] }
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite"] }

# HTTP
axum = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
tower-http = { workspace = true, features = ["cors", "trace"] }

# Schema
utoipa = "4.2"

# Internal
a2rchitech-history = { workspace = true }
a2rchitech-messaging = { workspace = true }
a2rchitech-policy = { workspace = true }
mcp-client = { path = "../../crates/mcp-client" }
async-trait = "0.1"
futures = "0.3"
tempfile = "3.0"
tokio-util = { version = "0.7", features = ["codec"] }
sha2 = "0.10"

[dev-dependencies]
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite", "chrono", "uuid"] }
