[package]
name = "policy-service"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Policy Service - HTTP API for policy decisions and access control"

[[bin]]
name = "policy-service"
path = "src/main.rs"

[dependencies]
axum = { workspace = true, features = ["ws", "macros"] }
tokio = { workspace = true, features = ["full"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
anyhow.workspace = true
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tower-http = { workspace = true, features = ["cors"] }
chrono = { workspace = true, features = ["serde"] }
uuid = { workspace = true, features = ["v4", "serde"] }
reqwest = { workspace = true, features = ["json", "rustls-tls"] }

allternit-policy = { workspace = true }
allternit-security-hardening = { workspace = true }
allternit-purpose-binding = { workspace = true }
allternit-policy-tier-gating = { workspace = true }

[dev-dependencies]
tokio-test = "0.4"
tower = { workspace = true }
