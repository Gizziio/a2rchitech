[package]
name = "kernel"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
axum = { version = "0.7", features = ["ws", "macros"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tower-http = { version = "0.5", features = ["cors"] }
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1.0"
thiserror = "1.0"
uuid = { version = "1.10.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tempfile = "3.10"
reqwest = { workspace = true, features = ["json", "rustls-tls", "stream"] }
base64 = "0.22"
lazy_static = "1.4"
sqlx = { version = "0.7", features = ["runtime-tokio", "sqlite"] }
allternit-tools = { path = "../../../1-kernel/support/allternit-kernel-tools-components" }
allternit-providers = { workspace = true }
allternit-kernel-contracts = { workspace = true }
voice-service = { path = "../../ml-ai-services/voice-service" }
webvm-service = { path = "../../../3-adapters/bridge-systems/allternit-webvm" }
capsule_spec = { path = "../../../../platform/contracts/schemas/allternit-capsule-spec" }
evidence_store = { path = "../../../2-governance/evidence-management/core-evidence" }
capsule_compiler = { path = "../../../1-kernel/capsule-system/allternit-capsule-compiler" }
async-trait = "0.1"
regex = "1.0"
allternit-history = { workspace = true }
allternit-messaging = { workspace = true }
allternit-policy = { workspace = true }
allternit-skills = { workspace = true }
allternit-tools-gateway = { workspace = true }
allternit-evals = { workspace = true }
allternit-context-router = { workspace = true }
allternit-embodiment = { workspace = true }
allternit-artifact-registry = { workspace = true }
allternit-memory = { workspace = true }
allternit-packaging = { workspace = true }
allternit-runtime-core = { workspace = true }
allternit-runtime = { path = "../../../1-kernel/infrastructure/allternit-runtime" }
portable-pty = "0.8"
futures = "0.3"
tokio-stream = { version = "0.1", features = ["sync"] }
allternit-workflows = { workspace = true }
ring = "0.17"
data-encoding = "2.0"
allternit-governor = { path = "../../../2-governance/governance-workflows/rust-governor" }
allternit-substrate = { path = "../../../../platform/types/allternit-substrate" }
