[package]
name = "allternit-context-router"
version = "0.1.0"
edition = "2021"
description = "Allternitchitech context routing and precision hydration engine"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
thiserror = "1.0"
anyhow = "1.0"
tracing = "0.1"
allternit-history = { workspace = true }
allternit-messaging = { workspace = true }
allternit-policy = { workspace = true }
allternit-runtime-core = { workspace = true }
allternit-kernel-contracts = { workspace = true }
async-trait = "0.1"
futures = "0.3"
sha2 = "0.10"
hex = "0.4"
lru = "0.12"

[dev-dependencies]
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite", "chrono", "uuid"] }
tempfile = "3.0"
