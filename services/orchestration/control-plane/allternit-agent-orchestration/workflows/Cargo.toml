[package]
name = "allternit-workflows"
version = "0.1.0"
edition = "2021"
description = "Allternitchitech workflow engine with DAG execution and scientific loop"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
tokio = { version = "1.0", features = ["full"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
thiserror = "1.0"
anyhow = "1.0"
tracing = "0.1"
schemars = { version = "0.8", features = ["derive"] }
sha2 = "0.10"
allternit-history = { workspace = true }
allternit-messaging = { workspace = true }
allternit-policy = { workspace = true }
allternit-tools-gateway = { workspace = true }
allternit-skills = { workspace = true }
allternit-kernel-contracts = { workspace = true }
async-trait = "0.1"
futures = "0.3"
petgraph = "0.6"
allternit-driver-interface = { workspace = true }
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite", "chrono", "uuid"] }

[dev-dependencies]
tempfile = "3.0"
ring = "0.17"
data-encoding = "2.0"
