[package]
name = "allternit-registry"
version = "0.1.0"
edition = "2021"
description = "Allternitchitech Unified Registry & Data Fabric - Single source of truth for tenant capabilities (agents, skills, tools) with multi-backend storage"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
utoipa = { version = "4.2", features = ["uuid", "chrono"] }
async-trait = { workspace = true }
sqlx = { workspace = true }
futures = "0.3"
chrono = { workspace = true }
redis = { workspace = true }

# Layer dependencies
allternit-skills = { workspace = true }
allternit-tools-gateway = { workspace = true }
allternit-policy = { workspace = true }
allternit-history = { workspace = true }
allternit-messaging = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
