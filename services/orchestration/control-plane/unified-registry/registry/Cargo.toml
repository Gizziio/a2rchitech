[package]
name = "a2rchitech-registry"
version = "0.1.0"
edition = "2021"
description = "A2rchitech Unified Registry & Data Fabric - Single source of truth for tenant capabilities (agents, skills, tools) with multi-backend storage"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
utoipa = { version = "4.2", features = ["uuid", "chrono"] }
async-trait = { workspace = true }
sqlx = { workspace = true }
futures = "0.3"
chrono = { workspace = true }
redis = { workspace = true }

# Layer dependencies
a2rchitech-skills = { workspace = true }
a2rchitech-tools-gateway = { workspace = true }
a2rchitech-policy = { workspace = true }
a2rchitech-history = { workspace = true }
a2rchitech-messaging = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
