# A2R Backend - Docker Compose Stack
# Complete self-hosted A2R platform

version: '3.8'

services:
  # ============================================================================
  # Main API Gateway
  # ============================================================================
  a2r-api:
    image: a2r/backend:latest
    container_name: a2r-api
    restart: unless-stopped
    ports:
      - "4096:4096"    # Main API port
      - "3000:3000"    # Legacy API
    volumes:
      - a2r-data:/var/lib/a2r/data
      - ./config:/opt/a2r/config:ro
    environment:
      - A2R_DATABASE_URL=sqlite:///var/lib/a2r/data/a2r.db
      - A2R_LOG_LEVEL=info
      - A2R_MODE=production
      - A2R_KERNEL_URL=http://kernel:3004
      - A2R_MEMORY_URL=http://memory:3200
    depends_on:
      - kernel
      - memory
    networks:
      - a2r-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================================
  # Kernel Service
  # ============================================================================
  kernel:
    image: a2r/backend:latest
    container_name: a2r-kernel
    restart: unless-stopped
    command: ["./bin/kernel-service"]
    expose:
      - "3004"
    volumes:
      - a2r-data:/var/lib/a2r/data
    environment:
      - A2R_DATABASE_URL=sqlite:///var/lib/a2r/data/kernel.db
      - A2R_LOG_LEVEL=info
    networks:
      - a2r-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # Memory Service
  # ============================================================================
  memory:
    image: a2r/backend:latest
    container_name: a2r-memory
    restart: unless-stopped
    command: ["./bin/a2rchitech-memory"]
    expose:
      - "3200"
    volumes:
      - a2r-data:/var/lib/a2r/data
    environment:
      - A2R_DATABASE_URL=sqlite:///var/lib/a2r/data/memory.db
    networks:
      - a2r-network

  # ============================================================================
  # Workspace Service (Terminal/Shell sessions)
  # ============================================================================
  workspace:
    image: a2r/backend:latest
    container_name: a2r-workspace
    restart: unless-stopped
    command: ["./bin/workspace-service"]
    expose:
      - "3021"
    volumes:
      - a2r-data:/var/lib/a2r/data
      - /var/run/docker.sock:/var/run/docker.sock:ro  # For containerized shells
    environment:
      - A2R_DATABASE_URL=sqlite:///var/lib/a2r/data/workspace.db
    networks:
      - a2r-network

  # ============================================================================
  # Web UI (Next.js platform)
  # ============================================================================
  web-ui:
    image: a2r/web-ui:latest
    container_name: a2r-web-ui
    restart: unless-stopped
    ports:
      - "3001:3000"    # Web UI on port 3001
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4096
      - NODE_ENV=production
    depends_on:
      - a2r-api
    networks:
      - a2r-network

  # ============================================================================
  # Nginx Reverse Proxy (Optional)
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: a2r-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - a2r-data:/var/lib/a2r/data
    depends_on:
      - a2r-api
      - web-ui
    networks:
      - a2r-network
    profiles:
      - with-nginx  # Only start with: docker-compose --profile with-nginx up

# ============================================================================
# Volumes
# ============================================================================
volumes:
  a2r-data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  a2r-network:
    driver: bridge
