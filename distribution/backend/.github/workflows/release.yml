name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      
      - name: Build release binaries
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }}
      
      - name: Package binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          ARCH=$(echo ${{ matrix.target }} | cut -d- -f1)
          PKG_NAME="a2r-backend-${VERSION}-${ARCH}-linux"
          
          mkdir -p "dist/${PKG_NAME}/bin"
          mkdir -p "dist/${PKG_NAME}/web"
          
          cp target/${{ matrix.target }}/release/a2r-api dist/${PKG_NAME}/bin/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/a2r-kernel dist/${PKG_NAME}/bin/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/a2r-memory dist/${PKG_NAME}/bin/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/a2r-workspace dist/${PKG_NAME}/bin/ 2>/dev/null || true
          
          cp distribution/backend/deploy/install.sh dist/${PKG_NAME}/
          chmod +x dist/${PKG_NAME}/install.sh
          
          cd dist
          tar -czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: dist/*.tar.gz

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Package binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          ARCH=$(echo ${{ matrix.target }} | cut -d- -f1)
          PKG_NAME="a2r-backend-${VERSION}-${ARCH}-macos"
          
          mkdir -p "dist/${PKG_NAME}/bin"
          mkdir -p "dist/${PKG_NAME}/web"
          
          cp target/${{ matrix.target }}/release/a2r-api dist/${PKG_NAME}/bin/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/a2r-kernel dist/${PKG_NAME}/bin/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/a2r-memory dist/${PKG_NAME}/bin/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/a2r-workspace dist/${PKG_NAME}/bin/ 2>/dev/null || true
          
          cp distribution/backend/deploy/install.sh dist/${PKG_NAME}/
          chmod +x dist/${PKG_NAME}/install.sh
          
          cd dist
          tar -czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: dist/*.tar.gz

  build-deb:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-x86_64-unknown-linux-gnu
          path: dist
      
      - name: Build .deb package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p debian/DEBIAN
          mkdir -p debian/opt/a2r/bin
          mkdir -p debian/etc/a2r
          mkdir -p debian/lib/systemd/system
          
          # Extract binaries
          tar -xzf dist/a2r-backend-${VERSION}-x86_64-linux.tar.gz -C /tmp
          cp /tmp/a2r-backend-${VERSION}-x86_64-linux/bin/* debian/opt/a2r/bin/
          
          # Create control file
          cat > debian/DEBIAN/control << EOF
Package: a2r-backend
Version: ${VERSION}
Section: web
Priority: optional
Architecture: amd64
Maintainer: A2R Team <team@a2r.dev>
Description: A2R Backend Server
EOF
          
          # Create systemd service
          cp distribution/backend/deploy/services/a2r-api.service debian/lib/systemd/system/
          
          dpkg-deb --build debian "a2r-backend_${VERSION}_amd64.deb"
      
      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: '*.deb'

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-deb]
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
