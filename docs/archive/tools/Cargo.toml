[package]
name = "agent-shell-acp-adapter"
version = "0.1.0"
edition = "2021"
description = "ACP adapter for a2rchitech - allows agent-shell (Emacs) to connect to a2rchitech"

[[bin]]
name = "a2r-acp"
path = "src/main.rs"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
reqwest = { version = "0.11", features = ["json"] }
