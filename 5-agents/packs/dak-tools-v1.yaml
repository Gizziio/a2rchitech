# DAK Tools Prompt Pack v1.0.0
#
# Tool instructions and schemas for DAK agents.

pack_id: "dak.tools"
name: "DAK Tools"
description: "Tool instructions and schemas for DAK agents"
version: "1.0.0"
deterministic: true

author: "a2r-platform"
tags: ["dak", "tools", "instructions"]

dependencies:
  - pack_id: "dak.core"
    version: ">=1.0.0"

variables:
  - name: "allowed_tools"
    type: "array"
    required: true
    description: "List of tools this agent is allowed to use"
  
  - name: "forbidden_tools"
    type: "array"
    required: false
    default: []
    description: "List of explicitly forbidden tools"
  
  - name: "write_scope"
    type: "object"
    required: true
    description: "Write scope configuration"
  
  - name: "policy_rules"
    type: "array"
    required: false
    description: "Active policy rules"

prompts:
  # Tool instruction sets
  - id: "instructions.claude"
    template: "prompts/instructions/claude.j2"
    description: "Claude Code-style tool instructions"
  
  - id: "instructions.mcp"
    template: "prompts/instructions/mcp.j2"
    description: "MCP tool instructions"
  
  # Individual tool schemas
  - id: "tool.read"
    template: "prompts/tool/read.j2"
    description: "Read tool schema and usage"
  
  - id: "tool.write"
    template: "prompts/tool/write.j2"
    description: "Write tool schema and usage"
  
  - id: "tool.edit"
    template: "prompts/tool/edit.j2"
    description: "Edit tool schema and usage"
  
  - id: "tool.bash"
    template: "prompts/tool/bash.j2"
    description: "Bash tool schema and usage"
  
  - id: "tool.glob"
    template: "prompts/tool/glob.j2"
    description: "Glob tool schema and usage"
  
  - id: "tool.grep"
    template: "prompts/tool/grep.j2"
    description: "Grep tool schema and usage"
  
  # Tool usage examples
  - id: "examples.correct"
    template: "prompts/examples/correct.j2"
    description: "Correct tool usage examples"
  
  - id: "examples.incorrect"
    template: "prompts/examples/incorrect.j2"
    description: "Incorrect tool usage examples with corrections"
